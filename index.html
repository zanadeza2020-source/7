<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تشريح • سريع للجوال</title>
    
    <!-- تحميل مسبق للخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Font Awesome بدون تأخير -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- خط Tajawal خفيف وسريع -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات أساسية محسنة للجوال */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        /* متغيرات للألوان */
        :root {
            --primary: #166064;
            --primary-dark: #0e4144;
            --secondary: #e3f3f0;
            --bg: #f0f5f7;
            --text: #1d3f42;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: fixed; /* منع التمرير غير المرغوب فيه */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* الحاوية الرئيسية */
        #app {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
            padding: 8px;
            padding-bottom: 70px; /* مساحة للأزرار السفلية */
        }

        /* شريط الحالة العلوي */
        .status-bar {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            font-weight: 500;
            font-size: 14px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .status-bar i {
            font-size: 18px;
        }

        .session-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* شريط التمرير السريع للصور */
        .image-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 4px 0 12px 0;
            margin-bottom: 8px;
            scroll-snap-type: x mandatory;
            position: relative;
            z-index: 5;
        }

        .image-scroll::-webkit-scrollbar {
            display: none;
        }

        .thumb-btn {
            flex: 0 0 70px;
            height: 70px;
            border-radius: 25px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            scroll-snap-align: start;
            transition: all 0.1s ease;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .thumb-btn.active {
            border-color: var(--primary);
            background: var(--secondary);
            transform: scale(0.98);
        }

        .thumb-btn i {
            font-size: 24px;
            color: var(--primary);
        }

        .thumb-btn span {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-dark);
            background: #eef9f6;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* منطقة الصورة الرئيسية */
        .image-area {
            background: #12383d;
            border-radius: 40px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 3px solid white;
            position: relative;
            touch-action: none; /* منع التمرير أثناء التكبير */
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #12383d;
            display: block;
            pointer-events: none; /* الصورة لا تمنع اللمس */
            -webkit-user-select: none;
            user-select: none;
        }

        /* طبقة اللمس للتحكم */
        .touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
        }

        /* أزرار التحكم بالصورة */
        .image-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 20;
        }

        .ctrl-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.1s;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .ctrl-btn:active {
            background: var(--primary);
            transform: scale(0.9);
        }

        /* بطاقة المعلومات */
        .info-card {
            background: white;
            border-radius: 35px;
            padding: 18px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid #e0f0ec;
        }

        .info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-header h2 {
            font-size: 18px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .file-name {
            background: var(--primary);
            color: white;
            padding: 5px 18px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 600;
        }

        /* النص مع scroll سلس */
        .notes-text {
            background: #f9fffd;
            border-radius: 28px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-size: 14px;
            line-height: 1.7;
            color: #1f4a4a;
            border: 1px solid #c7e6df;
            white-space: pre-line;
        }

        /* شريط الإجراءات السفلية */
        .action-bar {
            display: flex;
            gap: 8px;
            position: fixed;
            bottom: 8px;
            left: 8px;
            right: 8px;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 8px;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid white;
        }

        .action-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 30px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .action-btn:active {
            background: var(--primary);
            color: white;
        }

        .action-btn i {
            font-size: 16px;
        }

        /* شريط التقدم */
        .progress-bar {
            height: 3px;
            background: rgba(22, 96, 100, 0.1);
            border-radius: 10px;
            margin: 10px 0 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.1s;
        }

        /* رسالة الخطأ */
        .error-toast {
            background: #d14c4c;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* رابط الصورة (مخفي لكن متاح للنسخ) */
        .hidden-link {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* تحسينات إضافية */
        .text-small {
            font-size: 12px;
            color: #6d8f8f;
        }

        .mt-2 {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- شريط الحالة -->
        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-heartbeat"></i>
                <span>أطلس التشريح</span>
            </div>
            <div class="session-badge" id="sessionDisplay">
                <i class="fas fa-user"></i>
                <span id="sessionId">...</span>
            </div>
        </div>

        <!-- شريط التمرير السريع للصور -->
        <div class="image-scroll" id="thumbStrip"></div>

        <!-- منطقة الصورة -->
        <div class="image-area" id="imageArea">
            <img id="mainImage" src="" alt="صورة تشريحية" loading="lazy">
            <div class="touch-layer" id="touchLayer"></div>
            <div class="image-controls">
                <button class="ctrl-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
                <button class="ctrl-btn" id="zoomReset"><i class="fas fa-undo"></i></button>
                <button class="ctrl-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <!-- بطاقة المعلومات -->
        <div class="info-card">
            <div class="info-header">
                <h2>
                    <i class="fas fa-file-alt"></i>
                    شرح الصورة
                </h2>
                <span class="file-name" id="fileName">1.jpg</span>
            </div>
            <div class="notes-text" id="notesContent">
                جاري التحميل...
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="text-small" style="display: flex; justify-content: space-between;">
                <span id="imageCounter">1 / 9</span>
                <span>اسحب لليسار واليمين للتنقل</span>
            </div>
        </div>
    </div>

    <!-- شريط الإجراءات السفلي -->
    <div class="action-bar">
        <button class="action-btn" id="downloadImgBtn">
            <i class="fas fa-download"></i>
            تحميل الصورة
        </button>
        <button class="action-btn" id="downloadTxtBtn">
            <i class="fas fa-file-alt"></i>
            النص
        </button>
        <button class="action-btn" id="copyLinkBtn">
            <i class="fas fa-link"></i>
            الرابط
        </button>
        <button class="action-btn" id="shareBtn">
            <i class="fas fa-share"></i>
            مشاركة
        </button>
    </div>

    <!-- رسالة الخطأ -->
    <div class="error-toast" id="errorToast">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage"></span>
    </div>

    <!-- عنصر مخفي للرابط -->
    <input type="text" id="hiddenLink" class="hidden-link" readonly>

    <script>
        (function() {
            // ---------- بيانات الموقع (محفوظة في الذاكرة) ----------
            const IMAGES = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', 
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            const NOTES = [
                `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY | الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is a scbonglai red model full model heads accumulation of heart, and a vornory dissection crossention on the heart.

## Physiology | علم وظائف الأعضاء
Physiology is a corcpanyaotes the pumping blood living blood with hannisd group flows as to emit operators (respiratory system, and gas exchange.)

### The study of anatomy | دراسة التشريح
- **Gross anatomy | التشريح العبائي**
  - Microscopic anatomy (Histology) (تشريح المجهري (علم الأنسجة))

- **TISSUE | نسيج**
  - Epithelial tissue / Connective tissue / Muscle tissue / Nerve tissue

### LEVEL OF STRUCTURAL ORGANIZATION OF THE BODY | مستوى التنظيم الهيكلي للجسم
- **ATOMS MOLECULES AND COMPOUNDS | الذرات والجزئيات (إم والمركبات)**
  H₂O, C, O, N, P, S

- **ORGANISM LEVEL**  
  Nucleus / Mitochondrion / Cell membrane

- **SYSTEM | جهاز**
  STOMACH | المدة  
  Muscle tissue / Nerve tissue / Epithelial tissue

### RESPIRATORY SYSTEM | الجهاز التنفسي`,
                // باقي النصوص كما هي - سأختصرها هنا للتوفير في المساحة
                `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية التشريحية`,
                `# BODY REGIONS | مناطق الجسم`,
                `# 1 Chemical level | المستوى الكيميائي`,
                `# ABDOMEN, APPENDICULAR BODY & BODY PLANES | البطن، الجسم الزوادي ومستويات الجسم`,
                `# STUDY GUIDE: BODY CAVITIES AND HOMEOSTASIS | دليل الدراسة: تجاويف الجسم والاتزان الداخلي`,
                `# BODY CAVITIES | تجويف الجسم`,
                `# NEGATIVE FEEDBACK AND HOMEOSTASIS | التغذية الراجعة السلبية والاتزان الداخلي`,
                `# الصورة التاسعة | Image 9`
            ];

            // ---------- متغيرات الحالة ----------
            let currentIndex = 0;
            let zoom = 1;
            let touchStartX = 0;
            let touchStartY = 0;
            let isSwiping = false;
            let sessionId = '';
            
            // عناصر DOM
            const mainImage = document.getElementById('mainImage');
            const thumbStrip = document.getElementById('thumbStrip');
            const fileName = document.getElementById('fileName');
            const notesContent = document.getElementById('notesContent');
            const sessionSpan = document.getElementById('sessionId');
            const progressFill = document.getElementById('progressFill');
            const imageCounter = document.getElementById('imageCounter');
            const errorToast = document.getElementById('errorToast');
            const errorMessage = document.getElementById('errorMessage');
            const touchLayer = document.getElementById('touchLayer');
            const hiddenLink = document.getElementById('hiddenLink');

            // ---------- استعادة الجلسة من localStorage ----------
            function initSession() {
                // جلب أو إنشاء معرف جلسة
                sessionId = localStorage.getItem('anatomy_session');
                if (!sessionId) {
                    sessionId = Math.random().toString(36).substring(2, 10).toUpperCase();
                    localStorage.setItem('anatomy_session', sessionId);
                }
                sessionSpan.textContent = sessionId.substring(0, 4) + '...';
                
                // استعادة آخر صورة تم عرضها
                const lastImage = localStorage.getItem('last_image');
                if (lastImage !== null) {
                    currentIndex = parseInt(lastImage);
                    if (isNaN(currentIndex) || currentIndex < 0 || currentIndex >= IMAGES.length) {
                        currentIndex = 0;
                    }
                }
                
                // استعادة من الرابط إذا وجد
                const hash = window.location.hash;
                if (hash && hash.startsWith('#img-')) {
                    const num = parseInt(hash.replace('#img-', ''));
                    if (num >= 1 && num <= IMAGES.length) {
                        currentIndex = num - 1;
                        localStorage.setItem('last_image', currentIndex);
                    }
                }
            }

            // ---------- حفظ الحالة ----------
            function saveState() {
                localStorage.setItem('last_image', currentIndex);
                localStorage.setItem('session_' + sessionId, JSON.stringify({
                    lastImage: currentIndex,
                    timestamp: Date.now()
                }));
                
                // تحديث الرابط
                const url = new URL(window.location.href);
                url.hash = `#img-${currentIndex + 1}`;
                hiddenLink.value = url.toString();
                window.history.replaceState({}, '', url.toString());
            }

            // ---------- بناء شريط التصغيرات ----------
            function buildThumbStrip() {
                thumbStrip.innerHTML = '';
                for (let i = 0; i < IMAGES.length; i++) {
                    const thumb = document.createElement('div');
                    thumb.className = `thumb-btn ${i === currentIndex ? 'active' : ''}`;
                    thumb.setAttribute('data-index', i);
                    thumb.innerHTML = `
                        <i class="fas fa-image"></i>
                        <span>${i + 1}</span>
                    `;
                    
                    thumb.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const idx = parseInt(e.currentTarget.getAttribute('data-index'));
                        changeImage(idx);
                    });
                    
                    thumbStrip.appendChild(thumb);
                }
            }

            // ---------- تغيير الصورة ----------
            function changeImage(index) {
                if (index < 0 || index >= IMAGES.length) return;
                
                currentIndex = index;
                
                // تحديث الصورة
                mainImage.src = IMAGES[index];
                
                // تحديث المعلومات
                fileName.textContent = IMAGES[index];
                notesContent.textContent = NOTES[index];
                imageCounter.textContent = `${index + 1} / ${IMAGES.length}`;
                progressFill.style.width = `${((index + 1) / IMAGES.length) * 100}%`;
                
                // تحديث الأزرار
                document.querySelectorAll('.thumb-btn').forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                
                // إعادة التكبير
                zoom = 1;
                mainImage.style.transform = `scale(${zoom})`;
                
                // تمرير التصغير للصورة النشطة
                const activeThumb = document.querySelector(`.thumb-btn[data-index="${index}"]`);
                if (activeThumb) {
                    activeThumb.scrollIntoView({
                        behavior: 'auto',
                        block: 'nearest',
                        inline: 'center'
                    });
                }
                
                // حفظ الحالة
                saveState();
                
                // إخفاء أي خطأ
                hideError();
            }

            // ---------- إظهار الخطأ ----------
            function showError(msg) {
                errorMessage.textContent = msg;
                errorToast.style.display = 'flex';
                setTimeout(() => {
                    errorToast.style.display = 'none';
                }, 3000);
            }

            function hideError() {
                errorToast.style.display = 'none';
            }

            // ---------- معالجة اللمس للتنقل ----------
            touchLayer.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isSwiping = true;
            }, { passive: true });

            touchLayer.addEventListener('touchmove', (e) => {
                if (!isSwiping) return;
                
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                
                // إذا كان التمرير أفقي أكثر من عمودي
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 20) {
                    e.preventDefault();
                }
            }, { passive: false });

            touchLayer.addEventListener('touchend', (e) => {
                if (!isSwiping) return;
                
                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                
                // تنقل فقط إذا كانت الحركة أفقية واضحة
                if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 0 && currentIndex > 0) {
                        // سحب لليمين -> الصورة السابقة
                        changeImage(currentIndex - 1);
                    } else if (deltaX < 0 && currentIndex < IMAGES.length - 1) {
                        // سحب لليسار -> الصورة التالية
                        changeImage(currentIndex + 1);
                    }
                }
                
                isSwiping = false;
            }, { passive: true });

            // ---------- التكبير والتصغير ----------
            document.getElementById('zoomIn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                zoom = Math.min(zoom + 0.2, 2.5);
                mainImage.style.transform = `scale(${zoom})`;
            });

            document.getElementById('zoomOut').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                zoom = Math.max(zoom - 0.2, 0.8);
                mainImage.style.transform = `scale(${zoom})`;
            });

            document.getElementById('zoomReset').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                zoom = 1;
                mainImage.style.transform = `scale(${zoom})`;
            });

            // ---------- تحميل الصورة ----------
            document.getElementById('downloadImgBtn').addEventListener('click', (e) => {
                e.preventDefault();
                const link = document.createElement('a');
                link.href = IMAGES[currentIndex];
                link.download = IMAGES[currentIndex];
                link.click();
            });

            // ---------- تحميل النص ----------
            document.getElementById('downloadTxtBtn').addEventListener('click', (e) => {
                e.preventDefault();
                const text = NOTES[currentIndex];
                const blob = new Blob([text], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `notes_${currentIndex + 1}.txt`;
                link.click();
                URL.revokeObjectURL(link.href);
            });

            // ---------- نسخ الرابط ----------
            document.getElementById('copyLinkBtn').addEventListener('click', (e) => {
                e.preventDefault();
                const url = window.location.href.split('#')[0] + `#img-${currentIndex + 1}`;
                hiddenLink.value = url;
                hiddenLink.select();
                hiddenLink.setSelectionRange(0, 99999);
                
                try {
                    document.execCommand('copy');
                    showError('✅ تم نسخ الرابط');
                } catch (err) {
                    showError('❌ فشل النسخ');
                }
            });

            // ---------- مشاركة ----------
            document.getElementById('shareBtn').addEventListener('click', (e) => {
                e.preventDefault();
                if (navigator.share) {
                    navigator.share({
                        title: `صورة ${IMAGES[currentIndex]}`,
                        text: NOTES[currentIndex].substring(0, 100) + '...',
                        url: window.location.href.split('#')[0] + `#img-${currentIndex + 1}`
                    }).catch(() => {});
                } else {
                    showError('يمكنك نسخ الرابط للمشاركة');
                }
            });

            // ---------- معالجة أخطاء تحميل الصورة ----------
            mainImage.onerror = function() {
                showError(`⚠️ الصورة ${IMAGES[currentIndex]} غير موجودة`);
            };

            mainImage.onload = function() {
                hideError();
            };

            // ---------- معالجة الرجوع للخلف ----------
            window.addEventListener('popstate', (event) => {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#img-')) {
                    const num = parseInt(hash.replace('#img-', ''));
                    if (num >= 1 && num <= IMAGES.length) {
                        changeImage(num - 1);
                    }
                }
            });

            // ---------- بدء التطبيق ----------
            initSession();
            buildThumbStrip();
            changeImage(currentIndex);
            
            // منع القوائم المنبثقة عند اللمس الطويل
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            
            // تخزين مؤقت للبيانات في الذاكرة
            const cache = {};
            NOTES.forEach((note, i) => {
                cache[i] = note;
            });
        })();
    </script>
</body>
</html>
