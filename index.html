<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أطلس التشريح • الصور الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #edf2f7 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* رأس الموقع */
        .header {
            background: #1e3b4a;
            border-radius: 40px;
            padding: 1.5rem 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 35px rgba(20, 50, 60, 0.3);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo i {
            font-size: 2.8rem;
            color: #9bc5c0;
        }

        .logo h1 {
            font-weight: 700;
            font-size: 2rem;
            color: #fff;
        }

        .logo p {
            color: #b8dfd8;
            font-weight: 300;
        }

        .badge {
            background: #2f5e67;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
            border: 1px solid #6b9b9b;
        }

        /* شبكة الأيقونات */
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 2.5rem 0;
        }

        .icon-btn {
            background: white;
            width: 110px;
            height: 120px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .icon-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 35px rgba(30, 70, 80, 0.2);
            border-color: #468b8b;
        }

        .icon-btn.active {
            background: #e1f0ed;
            border: 3px solid #1f7870;
            box-shadow: 0 0 0 5px rgba(31, 120, 112, 0.15);
        }

        .icon-number {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #1f7870;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            border: 3px solid white;
        }

        .icon-btn i {
            font-size: 2.8rem;
            color: #2a605b;
        }

        .icon-btn span {
            font-weight: 600;
            color: #1b4c4c;
            background: #f0f7f5;
            padding: 0.2rem 1rem;
            border-radius: 50px;
        }

        /* منطقة العرض الرئيسية */
        .display-area {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 2.5rem;
            box-shadow: 0 30px 50px rgba(20, 50, 55, 0.2);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .split-view {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 2.2rem;
        }

        /* إطار الصورة */
        .image-container {
            background: #1a3136;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            border: 5px solid rgba(255,255,255,0.5);
            aspect-ratio: 4/3;
            position: relative;
        }

        #displayedImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #14292e;
            display: block;
            cursor: zoom-in;
            transition: transform 0.3s;
        }

        .image-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            display: flex;
            gap: 1.2rem;
        }

        .image-controls button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            transition: 0.2s;
        }

        .image-controls button:hover {
            background: rgba(255,255,255,0.2);
        }

        /* بطاقة الشرح */
        .info-card {
            background: #ffffffd9;
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 2rem;
            border: 1px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #d0e2dd;
        }

        .info-header h2 {
            font-size: 1.8rem;
            color: #185e5e;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .filename {
            background: #185e5e;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .notes-text {
            background: #f3faf8;
            border-radius: 40px;
            padding: 2rem;
            max-height: 350px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 1.05rem;
            color: #1f4949;
            white-space: pre-line;
            border: 1px solid #cde3de;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.02);
        }

        /* زر تحميل النص */
        .download-btn {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            background: white;
            border: 2px solid #1f7870;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            color: #1f7870;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 1.1rem;
        }

        .btn:hover {
            background: #1f7870;
            color: white;
        }

        /* تعليمات للرفع على GitHub */
        .setup-guide {
            background: #e7eef0;
            border-radius: 30px;
            padding: 1.2rem 2rem;
            margin-top: 2rem;
            border: 1px dashed #468b8b;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .setup-guide i {
            font-size: 2rem;
            color: #2e6b6b;
        }

        .setup-guide p {
            font-size: 1.1rem;
            color: #124d4d;
            font-weight: 500;
        }

        .setup-guide code {
            background: #1f4949;
            color: #e1fffa;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1rem;
        }

        @media (max-width: 900px) {
            .split-view {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- الهيدر مع شرح طريقة الرفع -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-x-ray"></i>
            <div>
                <h1>الموسوعة التشريحية</h1>
                <p>الصور والنصوص المستخرجة - جاهز لـ GitHub Pages</p>
            </div>
        </div>
        <div class="badge">
            <i class="fas fa-check-circle"></i>
            <span>8 صور جاهزة</span>
        </div>
    </div>

    <!-- شبكة الأيقونات (تمثل الصور 1-8) -->
    <div class="icon-grid" id="iconGrid"></div>

    <!-- منطقة العرض الرئيسية -->
    <div class="display-area">
        <div class="split-view">
            <!-- الجانب الأيمن: الصورة -->
            <div class="image-container">
                <img id="displayedImage" src="" alt="صورة تشريحية">
                <div class="image-controls">
                    <button id="zoomIn"><i class="fas fa-search-plus"></i></button>
                    <button id="zoomOut"><i class="fas fa-search-minus"></i></button>
                    <button id="fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            
            <!-- الجانب الأيسر: الشرح -->
            <div class="info-card">
                <div class="info-header">
                    <h2><i class="fas fa-notes-medical"></i> شرح الصورة</h2>
                    <span class="filename" id="filenameDisplay">1.jpg</span>
                </div>
                <div class="notes-text" id="notesDisplay">
                    جاري تحميل الشرح...
                </div>
                <div class="download-btn">
                    <button class="btn" id="downloadTextBtn">
                        <i class="fas fa-download"></i> تحميل النص
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- دليل المستخدم / المطور (كيف ترفع الملفات) -->
    <div class="setup-guide">
        <i class="fas fa-github"></i>
        <p>لرفع الموقع على GitHub Pages:</p>
        <code>1- ارفع هذا الملف (index.html) في مستودع GitHub</code>
        <code>2- ارفع الصور 1.jpg إلى 8.jpg في نفس المجلد</code>
        <i class="fas fa-arrow-right"></i>
        <span style="color:#124d4d;">الموقع سيعمل مباشرة بعد الرفع</span>
    </div>
</div>

<script>
    (function() {
        // -------------------- النصوص المستخرجة من الصور --------------------
        const notesData = [
            `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY | الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is a scbonglai red model full model heads accumulation of heart, and a vornory dissection crossention on the heart.

## Physiology | علم وظائف الأعضاء
Physiology is a corcpanyaotes the pumping blood living blood with hannisd group flows as to emit operators (respiratory system, and gas exchange.)

### The study of anatomy | دراسة التشريح
- **Gross anatomy | التشريح العبائي**
  - Microscopic anatomy (Histology) (تشريح المجهري (علم الأنسجة))

- **TISSUE | نسيج**
  - Epithelial tissue / Connective tissue / Muscle tissue / Nerve tissue

### LEVEL OF STRUCTURAL ORGANIZATION OF THE BODY | مستوى التنظيم الهيكلي للجسم
- **ATOMS MOLECULES AND COMPOUNDS | الذرات والجزئيات (إم والمركبات)**
  H₂O, C, O, N, P, S

- **ORGANISM LEVEL**  
  Nucleus / Mitochondrion / Cell membrane

- **SYSTEM | جهاز**
  STOMACH | المدة  
  Muscle tissue / Nerve tissue / Epithelial tissue

### RESPIRATORY SYSTEM | الجهاز التنفسي`,

            `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية التشريحية

*Directional terms are words that describe the position of one body part relative to another.*

## Superior (cranial) | العلوي (القحفي)  
Toward the head end or upper part; above. The head is superior to the abdomen.

## Inferior (caudal) | السفلي (الداخلي)  
Away from head; below. The navel is inferior to the chin.

## Ventral (anterior) | البطني (الأمامي)  
Toward front. The breastbone is anterior to the spine.

## Dorsal (posterior) | الظهري (الخلفي)  
Toward back. The heart is posterior to the breastbone.

## Medial | الإنسي / Lateral | الوحشي  
Medial: toward midline. Lateral: away from midline.

## Intermediate | المتوسط  
Between medial and lateral (e.g. collarbone).

## Proximal | الدالي / Distal | القاصي  
Closer to / farther from attachment.

## Superficial | السطحي / Deep | العميق  
Skin is superficial to skeletal muscles. Lungs are deep to skin.

**ANATOMICAL POSITION**`,

            `# BODY REGIONS | مناطق الجسم

*The major body regions: head, neck, trunk, upper extremity, and lower extremity.*

## 1. Head | الرأس
- Facial region (eyes, nose, mouth)
- Cranial region (Cranium) | المنطقة القحفية
- Neck (Cervical region) | الرقبة

### Trunk regions (Torso)
- Axillary Region (Armpit)
- Mammary Region (Breast)
- Sternal Region (Breast bone)
- Abdominal Region (Stomach area)
- Vertebral region (along spine)

## 5. Lower Extremity | الأطراف السفلية
Basic description of legs and lower limbs.`,

            `# 1 Chemical level | المستوى الكيميائي
Atoms combine to form molecules. (H₂O, C, O, N, P, S)

# 2 Cellular level | المستوى الخلوي
Cells are made up of molecules. (Nucleus, Mitochondrion, organelles)

# 3 Tissue level | المستوى النسيجي
Tissues consist of similar types of cells. (Muscle tissue, Connective tissue, Nerve tissue)

# 4 Organ level | المستوى العضوي
Organs are made up of different types of tissues. (Heart, blood vessels)

# 5 Organ system level | مستوى النظام العضوي
Organ systems consist of different organs. (Cardiovascular system)

# 8 Anatomical Position | الوضعية التشريحية
Standing erect, facing observer, palms forward.`,

            `# ABDOMEN, APPENDICULAR BODY & BODY PLANES | البطن، الجسم الزوادي ومستويات الجسم

*The abdomen has been divided into nine regions or four quadrants.*

**The Nine Abdominal Regions | تسع مناطق بطنية**
- Right hypochondriac region (منطقة تحت الضلع الأيمن)
- Right lumbar region (منطقة قطنية يمين)
- Right iliac region (منطقة حرقفية يمين)
- Hypogastric region (منطقة فوق العانة)

**BODY PLANES AND SECTIONS | مستويات وأقسام الجسم**
- Frontal (Coronal) plane: divides into anterior and posterior.
- Sagittal plane: divides into right and left halves.
- Transverse plane: divides into upper and lower sections.`,

            `# STUDY GUIDE: BODY CAVITIES AND HOMEOSTASIS | دليل الدراسة: تجاويف الجسم والاتزان الداخلي

## 1. BODY CAVITIES | تجاويف الجسم
- Ventral Body Cavity (التجويف البطني)
  - Thoracic Cavity (التجويف الصدري)
  - MEDIASTINUM (المنصف): contains heart, thymus, esophagus, trachea.
- Abdomenopelvic Cavity (التجويف البطني الحوضي)
- Pericardial Cavity (التجويف التاموري)

**HOMEOSTASIS | الاتزان الداخلي**
Stability of internal environment.

**HOMEOSTATIC REGULATION MECHANISMS**
- Receptor (المستقبل)
- Control Center (مركز التحكم)
- Effector (المنفذ)

**FEEDBACK SYSTEMS**
Positive feedback: labor contractions, blood clotting.`,

            `# BODY CAVITIES | تجويف الجسم

**Hierarchy of Body Cavities | مستوى تجاويف الجسم**

- Cranial cavity: brain
- Vertebral canal: spinal cord
- Thoracic cavity: heart and lungs (pleural cavities, mediastinum)
- Abdominal-pelvic cavity: digestive, urinary, reproductive organs

**Diaphragm | الحاجز** separates thoracic and abdominal cavities.

| Description | Contents |
|-------------|----------|
| Cranial cavity | Brain |
| Vertebral canal | Spinal cord |
| Thoracic cavity | Heart, lungs, mediastinum |
| Pleural cavity | Surrounds each lung |

**BODY CAVITIES**`,

            `# NEGATIVE FEEDBACK AND HOMEOSTASIS | التغذية الراجعة السلبية والاتزان الداخلي

## Negative feedback | التغذية الراجعة السلبية
Reduces stimulus and restores stable state.

### Blood glucose regulation | تنظيم جلاوكوز الدم
- High blood glucose → Beta cells release insulin → cells take up glucose, liver stores glycogen → glucose decreases.
- Low blood glucose → Alpha cells release glucagon → liver breaks down glycogen → glucose increases.

### Body temperature regulation | تنظيم درجة حرارة الجسم
- STIMULUS: Body temperature rises above 37.2°C
- RECEPTORS: Temperature sensors
- CONTROL CENTER: Hypothalamus
- EFFECTORS: Blood vessels, sweat glands
- RESULT: Increased blood flow to skin, sweating → temperature drops.

**Homeostasis restored | استعادة الاتزان الداخلي**`
        ];

        // -------------------- مسارات الصور (بنفس المجلد) --------------------
        // هنا تكتب أسماء الملفات كما سترفعها بالضبط
        const imagePaths = [
            '1.jpg',
            '2.jpg',
            '3.jpg',
            '4.jpg',
            '5.jpg',
            '6.jpg',
            '7.jpg',
            '8.jpg'
        ];

        let currentIndex = 0;
        let zoom = 1;

        // العناصر
        const iconGrid = document.getElementById('iconGrid');
        const displayedImage = document.getElementById('displayedImage');
        const filenameDisplay = document.getElementById('filenameDisplay');
        const notesDisplay = document.getElementById('notesDisplay');
        const zoomIn = document.getElementById('zoomIn');
        const zoomOut = document.getElementById('zoomOut');
        const fullscreen = document.getElementById('fullscreen');
        const downloadBtn = document.getElementById('downloadTextBtn');

        // بناء الأيقونات
        function buildIcons() {
            iconGrid.innerHTML = '';
            for (let i = 0; i < imagePaths.length; i++) {
                const btn = document.createElement('div');
                btn.className = `icon-btn ${i === currentIndex ? 'active' : ''}`;
                btn.dataset.index = i;
                btn.innerHTML = `
                    <div class="icon-number">${i+1}</div>
                    <i class="fas fa-image"></i>
                    <span>صورة ${i+1}</span>
                `;
                btn.addEventListener('click', () => setImage(i));
                iconGrid.appendChild(btn);
            }
        }

        // تغيير الصورة والشرح
        function setImage(index) {
            currentIndex = index;
            
            // تعيين مصدر الصورة (المسار النسبي)
            displayedImage.src = imagePaths[index];
            
            // تحديث اسم الملف
            filenameDisplay.innerText = imagePaths[index];
            
            // تحديث النص
            notesDisplay.innerText = notesData[index] || 'لا يوجد نص متاح لهذه الصورة.';
            
            // إعادة التكبير للوضع الطبيعي
            zoom = 1;
            displayedImage.style.transform = `scale(${zoom})`;
            
            // تحديث الأيقونات النشطة
            document.querySelectorAll('.icon-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // أحداث التكبير
        zoomIn.addEventListener('click', () => {
            zoom = Math.min(zoom + 0.2, 3);
            displayedImage.style.transform = `scale(${zoom})`;
        });

        zoomOut.addEventListener('click', () => {
            zoom = Math.max(zoom - 0.2, 0.5);
            displayedImage.style.transform = `scale(${zoom})`;
        });

        fullscreen.addEventListener('click', () => {
            const container = document.querySelector('.image-container');
            if (container.requestFullscreen) container.requestFullscreen();
        });

        // تحميل النص
        downloadBtn.addEventListener('click', () => {
            const text = notesDisplay.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `notes_${imagePaths[currentIndex].replace('.jpg','')}.txt`;
            link.click();
        });

        // محاولة تحميل الصورة الأولى (إذا فشلت تظهر رسالة خطأ)
        displayedImage.onerror = function() {
            notesDisplay.innerText = '⚠️ الصورة غير موجودة في المجلد. تأكد من رفع ' + imagePaths[currentIndex] + ' بنفس مكان ملف index.html';
        };

        // بدء التطبيق
        buildIcons();
        setImage(0);
    })();
</script>
</body>
</html>
