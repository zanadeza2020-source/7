<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أطلس التشريح - للطلاب</title>
    <style>
        /* ألوان هادئة ومناسبة للدراسة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: #f0f4f8;
            color: #1a3b3f;
            padding: 15px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* رأس الموقع */
        .header {
            background: #1c5f6b;
            color: white;
            padding: 20px 25px;
            border-radius: 35px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 6px 15px rgba(0,40,45,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo span {
            font-size: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .logo p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* مؤشر الاتصال */
        .offline-badge {
            background: #2a818f;
            padding: 10px 22px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            border: 1px solid #8ad0d0;
        }

        .offline-badge i {
            font-size: 20px;
        }

        /* شريط التحميل */
        .loading-bar {
            background: white;
            border-radius: 60px;
            height: 10px;
            margin: 5px 0 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .loading-progress {
            height: 100%;
            background: #1c5f6b;
            width: 0%;
            transition: width 0.3s;
            border-radius: 60px;
        }

        /* رسالة الحالة */
        .status-message {
            background: #e8f3f0;
            border: 1px solid #9fcbc5;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #14565e;
        }

        /* شبكة الأيقونات */
        .icons-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .icon-btn {
            width: 80px;
            height: 90px;
            background: white;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .icon-btn.active {
            border-color: #1c5f6b;
            background: #e1f2ef;
        }

        .icon-btn span {
            font-size: 28px;
        }

        .icon-btn small {
            font-weight: 600;
            color: #1f5a63;
            background: #e8f0ed;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 13px;
        }

        /* منطقة العرض */
        .display-area {
            background: white;
            border-radius: 45px;
            padding: 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        .split-view {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
        }

        /* حاوية الصورة */
        .image-container {
            background: #14373e;
            border-radius: 35px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid #d1ece5;
            position: relative;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #14373e;
            display: block;
        }

        .image-controls {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 40px;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* بطاقة المعلومات */
        .info-card {
            background: #f7fdfb;
            border-radius: 35px;
            padding: 22px;
            border: 1px solid #c3e2db;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-header h3 {
            font-size: 22px;
            color: #1c5f6b;
        }

        .file-badge {
            background: #1c5f6b;
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
        }

        .notes-box {
            background: white;
            border-radius: 28px;
            padding: 20px;
            max-height: 280px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 15px;
            border: 1px solid #cde3dd;
            white-space: pre-line;
        }

        /* أزرار الإجراءات */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: white;
            border: 2px solid #1c5f6b;
            padding: 12px 10px;
            border-radius: 50px;
            font-weight: 600;
            color: #1c5f6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            min-width: 120px;
        }

        .action-btn:hover {
            background: #1c5f6b;
            color: white;
        }

        /* رسالة الخطأ */
        .error-box {
            background: #ffe3de;
            border: 2px solid #c94a4a;
            color: #912f2f;
            padding: 15px 25px;
            border-radius: 60px;
            margin: 20px 0 0;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        /* تذييل */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #5e8a8a;
            font-size: 14px;
        }

        @media (max-width: 800px) {
            .split-view {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- رأس الموقع مع مؤشر عدم الاتصال -->
        <div class="header">
            <div class="logo">
                <span>🧠</span>
                <div>
                    <h1>أطلس التشريح</h1>
                    <p>للطلاب - يعمل بدون إنترنت</p>
                </div>
            </div>
            <div class="offline-badge" id="offlineStatus">
                <span>📶</span>
                <span id="statusText">يتم التحميل...</span>
            </div>
        </div>

        <!-- شريط التحميل -->
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>

        <!-- رسالة الحالة -->
        <div class="status-message" id="statusMessage">
            <span>🔄</span>
            <span id="messageText">جاري تحميل الموارد والصور...</span>
        </div>

        <!-- أزرار الصور -->
        <div class="icons-grid" id="imageIcons"></div>

        <!-- منطقة العرض الرئيسية -->
        <div class="display-area">
            <div class="split-view">
                <!-- الصورة -->
                <div class="image-container">
                    <img id="mainImage" src="" alt="صورة تشريحية">
                    <div class="image-controls">
                        <button class="ctrl-btn" id="zoomInBtn">+</button>
                        <button class="ctrl-btn" id="zoomOutBtn">-</button>
                        <button class="ctrl-btn" id="resetZoomBtn">↺</button>
                    </div>
                </div>

                <!-- المعلومات -->
                <div class="info-card">
                    <div class="info-header">
                        <h3>📝 شرح الصورة</h3>
                        <span class="file-badge" id="fileName">1.jpg</span>
                    </div>
                    <div class="notes-box" id="notesContent">
                        جاري تحميل النص...
                    </div>
                    <div class="actions">
                        <button class="action-btn" id="downloadImageBtn">
                            <span>📷</span> تحميل الصورة
                        </button>
                        <button class="action-btn" id="downloadTextBtn">
                            <span>📄</span> تحميل النص
                        </button>
                        <button class="action-btn" id="copyLinkBtn">
                            <span>🔗</span> نسخ الرابط
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-box" id="errorBox">
            <span>⚠️</span>
            <span id="errorText"></span>
        </div>

        <!-- تذييل -->
        <div class="footer">
            <p>✓ جميع الموارد محملة محلياً - يعمل بدون إنترنت</p>
            <p id="cacheStatus"></p>
        </div>
    </div>

    <script>
        (function() {
            // ---------- البيانات النصية (مخزنة محلياً) ----------
            const notesData = [
                // 1.jpg
                `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY | الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is a study of the structure of the body and its parts.

## Physiology | علم وظائف الأعضاء
Physiology is the study of how the body functions.

### The study of anatomy | دراسة التشريح
- **Gross anatomy | التشريح العياني**
- **Microscopic anatomy (Histology) | التشريح المجهري**

### TISSUE | نسيج
- Epithelial tissue / نسيج طلائي
- Connective tissue / نسيج ضام
- Muscle tissue / نسيج عضلي
- Nerve tissue / نسيج عصبي`,

                // 2.jpg
                `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية التشريحية

## Superior (cranial) | العلوي (القحفي)
Toward the head end. The head is superior to the abdomen.

## Inferior (caudal) | السفلي (الذنبي)
Away from head. The navel is inferior to the chin.

## Anterior (ventral) | الأمامي (البطني)
Toward front. The breastbone is anterior to the spine.

## Posterior (dorsal) | الخلفي (الظهري)
Toward back. The heart is posterior to the breastbone.

## Medial | الإنسي
Toward midline. The heart is medial to the arms.

## Lateral | الوحشي
Away from midline. The arms are lateral to the chest.`,

                // 3.jpg
                `# BODY REGIONS | مناطق الجسم

## Head | الرأس
- Facial region / المنطقة الوجهية
- Cranial region / المنطقة القحفية

## Neck | الرقبة
Cervical region / المنطقة العنقية

## Trunk | الجذع
- Thoracic region / المنطقة الصدرية
- Abdominal region / المنطقة البطنية
- Pelvic region / المنطقة الحوضية

## Upper Limb | الطرف العلوي
- Arm / العضد
- Forearm / الساعد
- Hand / اليد

## Lower Limb | الطرف السفلي
- Thigh / الفخذ
- Leg / الساق
- Foot / القدم`,

                // 4.jpg
                `# LEVELS OF ORGANIZATION | مستويات التنظيم

## 1. Chemical Level | المستوى الكيميائي
Atoms and molecules (H₂O, CO₂, O₂)

## 2. Cellular Level | المستوى الخلوي
Cells: basic unit of life

## 3. Tissue Level | المستوى النسيجي
Groups of similar cells

## 4. Organ Level | المستوى العضوي
Different tissues work together

## 5. System Level | مستوى الجهاز
Organs work together

## 6. Organism Level | مستوى الكائن الحي
All systems working together`,

                // 5.jpg
                `# ABDOMINAL REGIONS | المناطق البطنية

## Nine Regions | تسع مناطق
- Right hypochondriac / تحت الضلع الأيمن
- Epigastric / فوق المعدة
- Left hypochondriac / تحت الضلع الأيسر
- Right lumbar / قطني أيمن
- Umbilical / السري
- Left lumbar / قطني أيسر
- Right iliac / حرقفي أيمن
- Hypogastric / فوق العانة
- Left iliac / حرقفي أيسر

## Body Planes | مستويات الجسم
- Sagittal / سهمي
- Frontal / إكليلي
- Transverse / مستعرض`,

                // 6.jpg
                `# BODY CAVITIES | تجاويف الجسم

## Dorsal Cavity | التجويف الخلفي
- Cranial cavity / تجويف قحفي (brain)
- Vertebral canal / قناة فقرية (spinal cord)

## Ventral Cavity | التجويف الأمامي
- Thoracic cavity / تجويف صدري (heart, lungs)
- Abdominopelvic cavity / تجويف بطني حوضي
  - Abdominal / بطني (digestive organs)
  - Pelvic / حوضي (bladder, reproductive organs)

## Diaphragm | الحجاب الحاجز
Separates thoracic and abdominal cavities`,

                // 7.jpg
                `# HOMEOSTASIS | الاتزان الداخلي

## Definition | تعريف
Maintenance of stable internal environment

## Components | مكونات
- Receptor / مستقبل
- Control center / مركز تحكم
- Effector / منفذ

## Feedback Systems | أنظمة التغذية الراجعة
- Negative feedback / تغذية راجعة سلبية
  - Body temperature
  - Blood glucose
- Positive feedback / تغذية راجعة إيجابية
  - Childbirth
  - Blood clotting`,

                // 8.jpg
                `# NEGATIVE FEEDBACK EXAMPLES | أمثلة على التغذية الراجعة السلبية

## Body Temperature | درجة حرارة الجسم
High temp → sweating → cooling
Low temp → shivering → warming

## Blood Glucose | جلوكوز الدم
High glucose → insulin release → glucose decreases
Low glucose → glucagon release → glucose increases

## Blood Pressure | ضغط الدم
High pressure → heart rate decreases
Low pressure → heart rate increases`,

                // 9.jpg
                `# REVIEW | مراجعة

## Anatomical Position | الوضع التشريحي
- Standing erect / وقوف مستقيم
- Face forward / وجه للأمام
- Palms forward / كفوف للأمام

## Directional Terms Summary | ملخص المصطلحات الاتجاهية
- Superior/Inferior: علوي/سفلي
- Anterior/Posterior: أمامي/خلفي
- Medial/Lateral: إنسي/وحشي
- Proximal/Distal: دان/قاصي
- Superficial/Deep: سطحي/عميق`
            ];

            // أسماء ملفات الصور
            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            // ---------- متغيرات الحالة ----------
            let currentIndex = 0;
            let zoom = 1;
            let loadedCount = 0;
            const totalResources = imageFiles.length + 1; // صور + نص

            // عناصر الصفحة
            const imageIcons = document.getElementById('imageIcons');
            const mainImage = document.getElementById('mainImage');
            const fileName = document.getElementById('fileName');
            const notesContent = document.getElementById('notesContent');
            const loadingProgress = document.getElementById('loadingProgress');
            const statusMessage = document.getElementById('messageText');
            const offlineStatus = document.getElementById('statusText');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const cacheStatus = document.getElementById('cacheStatus');

            // ---------- تحديث شريط التحميل ----------
            function updateLoadingProgress() {
                loadedCount++;
                const percent = (loadedCount / totalResources) * 100;
                loadingProgress.style.width = percent + '%';
                
                if (loadedCount >= totalResources) {
                    statusMessage.innerText = '✓ جميع الموارد محملة محلياً - الموقع يعمل بدون إنترنت';
                    offlineStatus.innerText = '✓ بدون إنترنت';
                    cacheStatus.innerText = '✓ تم تخزين ' + imageFiles.length + ' صور و 9 نصوص في الذاكرة';
                }
            }

            // ---------- بناء أزرار الصور ----------
            function buildImageIcons() {
                imageIcons.innerHTML = '';
                for (let i = 0; i < imageFiles.length; i++) {
                    const btn = document.createElement('div');
                    btn.className = `icon-btn ${i === 0 ? 'active' : ''}`;
                    btn.setAttribute('data-index', i);
                    btn.innerHTML = `
                        <span>${i + 1}</span>
                        <small>صورة</small>
                    `;
                    btn.onclick = function() {
                        const index = parseInt(this.getAttribute('data-index'));
                        changeImage(index);
                    };
                    imageIcons.appendChild(btn);
                }
            }

            // ---------- تغيير الصورة ----------
            function changeImage(index) {
                if (index < 0 || index >= imageFiles.length) return;
                
                currentIndex = index;
                
                // تحديث الصورة
                mainImage.src = imageFiles[index];
                
                // تحديث النص واسم الملف
                fileName.innerText = imageFiles[index];
                notesContent.innerText = notesData[index];
                
                // تحديث الأزرار
                document.querySelectorAll('.icon-btn').forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                
                // إعادة التكبير
                zoom = 1;
                mainImage.style.transform = `scale(${zoom})`;
                
                // تحديث الرابط
                window.location.hash = `img-${index + 1}`;
                
                // إخفاء الخطأ
                errorBox.style.display = 'none';
            }

            // ---------- التحقق من وجود الصور ----------
            function checkImageExists(index) {
                const img = new Image();
                img.onload = function() {
                    updateLoadingProgress();
                };
                img.onerror = function() {
                    console.warn('الصورة غير موجودة:', imageFiles[index]);
                    updateLoadingProgress(); // نكمل حتى لو الصورة مش موجودة
                };
                img.src = imageFiles[index];
            }

            // ---------- تحميل جميع الموارد ----------
            function loadAllResources() {
                // تحميل الصور
                for (let i = 0; i < imageFiles.length; i++) {
                    checkImageExists(i);
                }
                
                // تحميل النصوص (تعتبر محملة)
                setTimeout(() => {
                    updateLoadingProgress(); // للنصوص
                }, 500);
                
                // بعد 3 ثواني نخفي رسالة التحميل
                setTimeout(() => {
                    if (loadedCount < totalResources) {
                        statusMessage.innerText = '✓ تم التحميل - بعض الصور قد لا تكون موجودة';
                        offlineStatus.innerText = '✓ بدون إنترنت';
                    }
                }, 3000);
            }

            // ---------- معالجة رابط الصفحة ----------
            function handleHash() {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#img-')) {
                    const num = parseInt(hash.replace('#img-', ''));
                    if (num >= 1 && num <= imageFiles.length) {
                        changeImage(num - 1);
                    }
                }
            }

            // ---------- أزرار التحكم بالصورة ----------
            document.getElementById('zoomInBtn').onclick = function() {
                zoom = Math.min(zoom + 0.2, 3);
                mainImage.style.transform = `scale(${zoom})`;
            };

            document.getElementById('zoomOutBtn').onclick = function() {
                zoom = Math.max(zoom - 0.2, 0.5);
                mainImage.style.transform = `scale(${zoom})`;
            };

            document.getElementById('resetZoomBtn').onclick = function() {
                zoom = 1;
                mainImage.style.transform = `scale(${zoom})`;
            };

            // ---------- تحميل الصورة ----------
            document.getElementById('downloadImageBtn').onclick = function() {
                const link = document.createElement('a');
                link.href = imageFiles[currentIndex];
                link.download = imageFiles[currentIndex];
                link.click();
            };

            // ---------- تحميل النص ----------
            document.getElementById('downloadTextBtn').onclick = function() {
                const text = notesData[currentIndex];
                const blob = new Blob([text], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `notes_${currentIndex + 1}.txt`;
                link.click();
            };

            // ---------- نسخ الرابط ----------
            document.getElementById('copyLinkBtn').onclick = function() {
                const url = window.location.href.split('#')[0] + `#img-${currentIndex + 1}`;
                navigator.clipboard.writeText(url).then(function() {
                    alert('✅ تم نسخ الرابط');
                }).catch(function() {
                    alert('❌ فشل النسخ');
                });
            };

            // ---------- معالجة أخطاء الصورة ----------
            mainImage.onerror = function() {
                errorText.innerText = `⚠️ الصورة ${imageFiles[currentIndex]} غير موجودة - تأكد من رفعها في نفس المجلد`;
                errorBox.style.display = 'flex';
            };

            mainImage.onload = function() {
                errorBox.style.display = 'none';
            };

            // ---------- حفظ الجلسة في localStorage ----------
            function saveSession() {
                const sessionId = 'user_' + Math.random().toString(36).substring(2, 8);
                localStorage.setItem('session_id', sessionId);
                localStorage.setItem('last_image', currentIndex);
            }

            // ---------- استعادة الجلسة ----------
            function loadSession() {
                const lastImage = localStorage.getItem('last_image');
                if (lastImage !== null) {
                    return parseInt(lastImage);
                }
                return 0;
            }

            // ---------- بدء الموقع ----------
            function init() {
                buildImageIcons();
                
                // استعادة آخر صورة
                const savedIndex = loadSession();
                
                // معالجة الرابط
                handleHash();
                
                // إذا ما في رابط، استخدم آخر صورة محفوظة
                if (!window.location.hash) {
                    changeImage(savedIndex);
                }
                
                // تحميل الموارد
                loadAllResources();
                
                // حفظ الجلسة
                saveSession();
                
                // عرض حالة عدم الاتصال
                offlineStatus.innerText = '✓ بدون إنترنت';
            }

            // بدء كل شيء
            init();
        })();
    </script>
</body>
</html>
