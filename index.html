<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أطلس التشريح • 9 صور كاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f0f4f7;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        .header {
            background: #1c4c5c;
            border-radius: 40px;
            padding: 1.5rem 2.5rem;
            margin-bottom: 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header i {
            color: #b2e3da;
            font-size: 2.5rem;
        }

        .image-counter {
            background: #2f697b;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            border: 2px solid #9bd3d3;
        }

        /* شبكة الأزرار */
        .buttons-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 2rem 0 2.5rem;
        }

        .image-btn {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            cursor: pointer;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .image-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 25px rgba(27, 78, 85, 0.2);
        }

        .image-btn.active {
            border-color: #1a7b7b;
            background: #e1f3f0;
            box-shadow: 0 0 0 4px rgba(26, 123, 123, 0.2);
        }

        .image-btn i {
            font-size: 2.2rem;
            color: #236b6b;
        }

        .image-btn span {
            font-weight: 700;
            color: #1a5151;
            background: #e7f3f0;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* منطقة العرض */
        .main-panel {
            background: white;
            border-radius: 70px;
            padding: 2.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0ecea;
        }

        .split-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 2.2rem;
        }

        /* حاوية الصورة */
        .image-box {
            background: #1f424a;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 6px solid #d9f0ec;
            aspect-ratio: 4/3;
            position: relative;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1b3f45;
            display: block;
            transition: transform 0.3s;
        }

        .image-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            display: flex;
            gap: 1rem;
            backdrop-filter: blur(5px);
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* بطاقة الشرح */
        .info-box {
            background: #f6fcfb;
            border-radius: 50px;
            padding: 2rem;
            border: 1px solid #c2e2db;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 3px solid #c1ddd6;
        }

        .info-header h2 {
            font-size: 1.8rem;
            color: #165a5a;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .file-badge {
            background: #165a5a;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .notes-content {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            max-height: 350px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 1rem;
            color: #174f4f;
            white-space: pre-line;
            border: 1px solid #c2ddd6;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }

        .download-section {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            background: white;
            border: 2px solid #1a7b7b;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            color: #1a7b7b;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.1rem;
        }

        .btn:hover {
            background: #1a7b7b;
            color: white;
        }

        /* رسالة خطأ الصور */
        .error-message {
            background: #fff1e0;
            border: 2px solid #c95c5c;
            color: #a03a3a;
            padding: 1rem 2rem;
            border-radius: 60px;
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .error-message i {
            margin-left: 0.7rem;
        }

        @media (max-width: 900px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- رأس الموقع -->
    <div class="header">
        <h1>
            <i class="fas fa-heartbeat"></i>
            أطلس التشريح البشري
        </h1>
        <div class="image-counter">
            <i class="fas fa-images"></i> 9 صور عالية الدقة
        </div>
    </div>

    <!-- أزرار الصور 1-9 -->
    <div class="buttons-grid" id="imageButtons"></div>

    <!-- منطقة العرض الرئيسية -->
    <div class="main-panel">
        <div class="split-layout">
            <!-- الجانب الأيمن: الصورة -->
            <div class="image-box">
                <img id="mainImage" src="" alt="صورة تشريحية">
                <div class="image-controls">
                    <button class="ctrl-btn" id="zoomIn"><i class="fas fa-search-plus"></i></button>
                    <button class="ctrl-btn" id="zoomOut"><i class="fas fa-search-minus"></i></button>
                    <button class="ctrl-btn" id="fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            
            <!-- الجانب الأيسر: الشرح -->
            <div class="info-box">
                <div class="info-header">
                    <h2>
                        <i class="fas fa-pen"></i>
                        شرح الصورة
                    </h2>
                    <span class="file-badge" id="filename">1.jpg</span>
                </div>
                <div class="notes-content" id="notes">
                    جاري تحميل النص...
                </div>
                <div class="download-section">
                    <button class="btn" id="downloadBtn">
                        <i class="fas fa-download"></i> تحميل النص
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- رسالة خطأ إذا الصور مش موجودة -->
    <div class="error-message" id="errorMsg">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText"></span>
    </div>
</div>

<script>
    (function() {
        // -------------------- البيانات: 9 صور و 9 نصوص --------------------
        // النصوص المستخرجة من الصور (من 1.jpg إلى 9.jpg)
        const notesData = [
            // 1.jpg
            `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY | الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is a scbonglai red model full model heads accumulation of heart, and a vornory dissection crossention on the heart.

## Physiology | علم وظائف الأعضاء
Physiology is a corcpanyaotes the pumping blood living blood with hannisd group flows as to emit operators (respiratory system, and gas exchange.)

### The study of anatomy | دراسة التشريح
- **Gross anatomy | التشريح العبائي**
  - Microscopic anatomy (Histology) (تشريح المجهري (علم الأنسجة))

- **TISSUE | نسيج**
  - Epithelial tissue / Connective tissue / Muscle tissue / Nerve tissue

### LEVEL OF STRUCTURAL ORGANIZATION OF THE BODY | مستوى التنظيم الهيكلي للجسم
- **ATOMS MOLECULES AND COMPOUNDS | الذرات والجزئيات (إم والمركبات)**
  H₂O, C, O, N, P, S

- **ORGANISM LEVEL**  
  Nucleus / Mitochondrion / Cell membrane

- **SYSTEM | جهاز**
  STOMACH | المدة  
  Muscle tissue / Nerve tissue / Epithelial tissue

### RESPIRATORY SYSTEM | الجهاز التنفسي`,

            // 2.jpg
            `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية التشريحية

*Directional terms are words that describe the position of one body part relative to another.*

## Superior (cranial) | العلوي (القحفي)  
Toward the head end or upper part; above. The head is superior to the abdomen.

## Inferior (caudal) | السفلي (الداخلي)  
Away from head; below. The navel is inferior to the chin.

## Ventral (anterior) | البطني (الأمامي)  
Toward front. The breastbone is anterior to the spine.

## Dorsal (posterior) | الظهري (الخلفي)  
Toward back. The heart is posterior to the breastbone.

## Medial | الإنسي / Lateral | الوحشي  
Medial: toward midline. Lateral: away from midline.

## Intermediate | المتوسط  
Between medial and lateral (e.g. collarbone).

## Proximal | الدالي / Distal | القاصي  
Closer to / farther from attachment.

## Superficial | السطحي / Deep | العميق  
Skin is superficial to skeletal muscles. Lungs are deep to skin.

**ANATOMICAL POSITION**`,

            // 3.jpg
            `# BODY REGIONS | مناطق الجسم

*The major body regions: head, neck, trunk, upper extremity, and lower extremity.*

## 1. Head | الرأس
- Facial region (eyes, nose, mouth)
- Cranial region (Cranium) | المنطقة القحفية
- Neck (Cervical region) | الرقبة

### Trunk regions (Torso)
- Axillary Region (Armpit)
- Mammary Region (Breast)
- Sternal Region (Breast bone)
- Abdominal Region (Stomach area)
- Vertebral region (along spine)

## 5. Lower Extremity | الأطراف السفلية
Basic description of legs and lower limbs.`,

            // 4.jpg
            `# 1 Chemical level | المستوى الكيميائي
Atoms combine to form molecules. (H₂O, C, O, N, P, S)

# 2 Cellular level | المستوى الخلوي
Cells are made up of molecules. (Nucleus, Mitochondrion, organelles)

# 3 Tissue level | المستوى النسيجي
Tissues consist of similar types of cells. (Muscle tissue, Connective tissue, Nerve tissue)

# 4 Organ level | المستوى العضوي
Organs are made up of different types of tissues. (Heart, blood vessels)

# 5 Organ system level | مستوى النظام العضوي
Organ systems consist of different organs. (Cardiovascular system)

# 8 Anatomical Position | الوضعية التشريحية
Standing erect, facing observer, palms forward.`,

            // 5.jpg
            `# ABDOMEN, APPENDICULAR BODY & BODY PLANES | البطن، الجسم الزوادي ومستويات الجسم

*The abdomen has been divided into nine regions or four quadrants.*

**The Nine Abdominal Regions | تسع مناطق بطنية**
- Right hypochondriac region (منطقة تحت الضلع الأيمن)
- Right lumbar region (منطقة قطنية يمين)
- Right iliac region (منطقة حرقفية يمين)
- Hypogastric region (منطقة فوق العانة)

**BODY PLANES AND SECTIONS | مستويات وأقسام الجسم**
- Frontal (Coronal) plane: divides into anterior and posterior.
- Sagittal plane: divides into right and left halves.
- Transverse plane: divides into upper and lower sections.`,

            // 6.jpg
            `# STUDY GUIDE: BODY CAVITIES AND HOMEOSTASIS | دليل الدراسة: تجاويف الجسم والاتزان الداخلي

## 1. BODY CAVITIES | تجاويف الجسم
- Ventral Body Cavity (التجويف البطني)
  - Thoracic Cavity (التجويف الصدري)
  - MEDIASTINUM (المنصف): contains heart, thymus, esophagus, trachea.
- Abdomenopelvic Cavity (التجويف البطني الحوضي)
- Pericardial Cavity (التجويف التاموري)

**HOMEOSTASIS | الاتزان الداخلي**
Stability of internal environment.

**HOMEOSTATIC REGULATION MECHANISMS**
- Receptor (المستقبل)
- Control Center (مركز التحكم)
- Effector (المنفذ)

**FEEDBACK SYSTEMS**
Positive feedback: labor contractions, blood clotting.`,

            // 7.jpg
            `# BODY CAVITIES | تجويف الجسم

**Hierarchy of Body Cavities | مستوى تجاويف الجسم**

- Cranial cavity: brain
- Vertebral canal: spinal cord
- Thoracic cavity: heart and lungs (pleural cavities, mediastinum)
- Abdominal-pelvic cavity: digestive, urinary, reproductive organs

**Diaphragm | الحاجز** separates thoracic and abdominal cavities.

| Description | Contents |
|-------------|----------|
| Cranial cavity | Brain |
| Vertebral canal | Spinal cord |
| Thoracic cavity | Heart, lungs, mediastinum |
| Pleural cavity | Surrounds each lung |

**BODY CAVITIES**`,

            // 8.jpg
            `# NEGATIVE FEEDBACK AND HOMEOSTASIS | التغذية الراجعة السلبية والاتزان الداخلي

## Negative feedback | التغذية الراجعة السلبية
Reduces stimulus and restores stable state.

### Blood glucose regulation | تنظيم جلاوكوز الدم
- High blood glucose → Beta cells release insulin → cells take up glucose, liver stores glycogen → glucose decreases.
- Low blood glucose → Alpha cells release glucagon → liver breaks down glycogen → glucose increases.

### Body temperature regulation | تنظيم درجة حرارة الجسم
- STIMULUS: Body temperature rises above 37.2°C
- RECEPTORS: Temperature sensors
- CONTROL CENTER: Hypothalamus
- EFFECTORS: Blood vessels, sweat glands
- RESULT: Increased blood flow to skin, sweating → temperature drops.

**Homeostasis restored | استعادة الاتزان الداخلي**`,

            // 9.jpg (إذا كان موجود - إذا لم يكن موجود، ضع نص افتراضي)
            `# الصورة التاسعة | Image 9
محتوى إضافي من الصورة التاسعة.
Additional content from image 9.`
        ];

        // مسارات الصور (9 صور)
        const imageFiles = [
            '1.jpg',
            '2.jpg',
            '3.jpg',
            '4.jpg',
            '5.jpg',
            '6.jpg',
            '7.jpg',
            '8.jpg',
            '9.jpg'
        ];

        let currentIndex = 0;
        let zoomLevel = 1;

        // عناصر الصفحة
        const imageButtons = document.getElementById('imageButtons');
        const mainImage = document.getElementById('mainImage');
        const filenameSpan = document.getElementById('filename');
        const notesDiv = document.getElementById('notes');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        // بناء أزرار الصور
        function buildButtons() {
            imageButtons.innerHTML = '';
            for (let i = 0; i < imageFiles.length; i++) {
                const btn = document.createElement('div');
                btn.className = `image-btn ${i === 0 ? 'active' : ''}`;
                btn.setAttribute('data-index', i);
                btn.innerHTML = `
                    <i class="fas fa-image"></i>
                    <span>${i + 1}</span>
                `;
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    changeImage(index);
                });
                imageButtons.appendChild(btn);
            }
        }

        // تغيير الصورة والشرح
        function changeImage(index) {
            currentIndex = index;
            
            // تحديث الصورة
            mainImage.src = imageFiles[index];
            
            // تحديث اسم الملف
            filenameSpan.innerText = imageFiles[index];
            
            // تحديث النص
            notesDiv.innerText = notesData[index];
            
            // إزالة active من جميع الأزرار
            document.querySelectorAll('.image-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // إضافة active للزر الحالي
            document.querySelector(`.image-btn[data-index="${index}"]`).classList.add('active');
            
            // إعادة التكبير إلى 1
            zoomLevel = 1;
            mainImage.style.transform = `scale(${zoomLevel})`;
            
            // إخفاء رسالة الخطأ
            errorMsg.style.display = 'none';
        }

        // التحقق من وجود الصور (يعرض رسالة إذا الصورة مش موجودة)
        mainImage.onerror = function() {
            errorText.innerText = `الصورة ${imageFiles[currentIndex]} غير موجودة في المجلد. تأكد من رفعها بجانب ملف index.html`;
            errorMsg.style.display = 'block';
        };

        mainImage.onload = function() {
            errorMsg.style.display = 'none';
        };

        // أحداث التكبير
        document.getElementById('zoomIn').addEventListener('click', function() {
            zoomLevel = Math.min(zoomLevel + 0.2, 3);
            mainImage.style.transform = `scale(${zoomLevel})`;
        });

        document.getElementById('zoomOut').addEventListener('click', function() {
            zoomLevel = Math.max(zoomLevel - 0.2, 0.5);
            mainImage.style.transform = `scale(${zoomLevel})`;
        });

        // ملء الشاشة
        document.getElementById('fullscreen').addEventListener('click', function() {
            const imageBox = document.querySelector('.image-box');
            if (imageBox.requestFullscreen) {
                imageBox.requestFullscreen();
            }
        });

        // تحميل النص
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const text = notesDiv.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `notes_${imageFiles[currentIndex].replace('.jpg', '')}.txt`;
            link.click();
        });

        // بدء الموقع
        buildButtons();
        changeImage(0); // يبدأ بالصورة الأولى
    })();
</script>
</body>
</html>
