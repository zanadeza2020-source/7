<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تشريح • التطبيق التعليمي المتكامل</title>
    
    <!-- أيقونات الموقع للتثبيت -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2316636f'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🫀%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2316636f'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E🫀%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#16636f">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== متغيرات الألوان ===== */
        :root {
            --primary: #16636f;
            --primary-light: #22818f;
            --primary-dark: #0e404a;
            --accent: #ffb347;
            --accent-light: #ffdb9c;
            --bg-light: #f5fafc;
            --text-dark: #1e4d58;
            --text-light: #4f7a7a;
            --card-bg: #ffffff;
            --shadow-sm: 0 4px 12px rgba(22,99,111,0.08);
            --shadow-md: 0 8px 20px rgba(22,99,111,0.12);
            --border-radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-light: #1a2a30;
            --text-dark: #e0f0f0;
            --text-light: #9fc5c5;
            --card-bg: #1d363b;
            background: #1a2a30;
        }

        body.dark-mode .card,
        body.dark-mode .search-box,
        body.dark-mode .image-thumb,
        body.dark-mode .quiz-container,
        body.dark-mode .explanation-section {
            background: #1d363b;
            border-color: #3d6f6f;
        }

        /* ===== حاوية التطبيق ===== */
        .app-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        /* ===== شريط التثبيت ===== */
        .install-bar {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-bottom: 2px solid var(--accent-light);
        }

        .install-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .install-info i {
            font-size: 22px;
            color: var(--accent-light);
        }

        .install-btn {
            background: var(--accent);
            border: none;
            color: var(--primary-dark);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== الشريط العلوي ===== */
        .top-nav {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-light);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .offline-badge {
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dark-mode-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        /* ===== التبويبات ===== */
        .tabs-container {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            background: var(--bg-light);
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background: var(--card-bg);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            border: 2px solid var(--primary);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* ===== منطقة المحتوى ===== */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            background: var(--bg-light);
            -webkit-overflow-scrolling: touch;
        }

        /* ===== قسم الإهداء ===== */
        .dedication-card {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            border: 1px solid var(--accent-light);
        }

        .dedication-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-light);
            margin: 5px 0;
        }

        .dedication-dua {
            font-size: 13px;
            background: rgba(0,0,0,0.15);
            padding: 8px;
            border-radius: 15px;
        }

        /* ===== بطاقة الترحيب ===== */
        .welcome-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border-right: 5px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .start-text {
            font-size: 18px;
            color: var(--primary-dark);
            background: rgba(22,99,111,0.1);
            display: inline-block;
            padding: 5px 25px;
            border-radius: 40px;
            margin-top: 8px;
        }

        /* ===== شريط البحث المتطور ===== */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box {
            background: var(--card-bg);
            border-radius: 50px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .search-box i {
            color: var(--primary);
            font-size: 16px;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 0;
            font-size: 15px;
            background: transparent;
            color: var(--text-dark);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 20px;
            margin-top: 5px;
            padding: 10px;
            box-shadow: var(--shadow-md);
            border: 2px solid var(--primary);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(22,99,111,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-result-item:hover {
            background: rgba(22,99,111,0.05);
        }

        .result-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-weight: 700;
            color: var(--primary);
        }

        .result-match {
            font-size: 12px;
            color: var(--text-light);
        }

        /* ===== شبكة الصور ===== */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .image-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .image-icon {
            height: 90px;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .image-label {
            padding: 8px;
            text-align: center;
            font-weight: 700;
            color: var(--primary);
            background: rgba(22,99,111,0.05);
        }

        /* ===== حاوية الصورة الرئيسية ===== */
        .image-container {
            background: var(--primary-dark);
            border-radius: 25px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid var(--accent-light);
            position: relative;
            margin-bottom: 15px;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--primary-dark);
            display: block;
            transition: transform 0.2s;
            transform-origin: center center;
        }

        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
        }

        .zoom-level {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 15;
        }

        /* ===== أزرار التحكم ===== */
        .control-panel {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .ctrl-btn.reset {
            background: var(--accent);
            color: var(--primary-dark);
        }

        .ctrl-btn.fullscreen {
            background: var(--primary-light);
        }

        /* ===== أزرار الإجراءات ===== */
        .action-bar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .action-btn.favorite {
            background: #ff6b6b;
            border-color: #ff3b3b;
            color: white;
        }

        /* ===== التنقل بين الصور ===== */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .nav-btn {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .nav-btn.next {
            background: var(--accent);
            color: var(--primary-dark);
        }

        /* ===== شرح الصورة ===== */
        .explanation-section {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #c0e6dd;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation-content {
            line-height: 1.8;
            font-size: 15px;
            white-space: pre-line;
        }

        .explanation-content h2 {
            font-size: 20px;
            color: var(--primary);
            margin: 20px 0 10px;
        }

        .explanation-content h3 {
            font-size: 18px;
            color: var(--primary-light);
            margin: 15px 0 8px;
        }

        .explanation-content ul {
            padding-right: 25px;
            margin: 10px 0;
        }

        .explanation-content li {
            margin: 5px 0;
        }

        /* ===== اختبارات مودل ===== */
        .quiz-container {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid var(--primary);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--accent-light);
        }

        .quiz-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .quiz-score-badge {
            background: var(--primary);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;
        }

        .quiz-progress {
            margin-bottom: 20px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .progress-bar {
            height: 10px;
            background: #e1f0ec;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 20px;
            transition: width 0.3s;
        }

        .quiz-question {
            font-size: 17px;
            font-weight: 700;
            margin: 20px 0 15px;
            padding: 15px;
            background: rgba(22,99,111,0.05);
            border-radius: 15px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background: #f0f7fa;
            padding: 15px 20px;
            border-radius: 18px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            font-weight: 500;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .quiz-option.wrong {
            background: #ff6b6b;
            color: white;
            border-color: #d32f2f;
        }

        .quiz-feedback {
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            background: #f0f7fa;
        }

        .quiz-explanation {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #c0e6dd;
            color: var(--primary-dark);
        }

        .quiz-reset-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        /* ===== الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            border: 1px solid #c0e6dd;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
        }

        .progress-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
        }

        /* ===== الشريط السفلي ===== */
        .bottom-nav {
            background: var(--primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px;
            border-top: 2px solid var(--accent-light);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 30px;
            color: #b0d8d8;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--accent-light);
            background: rgba(255,255,255,0.1);
        }

        /* ===== زر التثبيت ===== */
        .pwa-install-btn {
            position: fixed;
            bottom: 80px;
            right: 15px;
            background: var(--primary);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border: 2px solid var(--accent-light);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- شريط التثبيت العلوي -->
        <div class="install-bar" id="installBar" style="display: none;">
            <div class="install-info">
                <i class="fas fa-download"></i>
                <span>ثبّت التطبيق على جهازك</span>
            </div>
            <button class="install-btn" id="installButton">
                <i class="fas fa-arrow-down"></i> تثبيت
            </button>
        </div>

        <!-- الشريط العلوي -->
        <div class="top-nav">
            <div class="nav-left">
                <i class="fas fa-heartbeat" style="font-size: 24px; color: var(--accent-light);"></i>
                <span class="app-title">تشريح</span>
            </div>
            <div class="nav-right">
                <div class="offline-badge">
                    <i class="fas fa-cloud-check" id="statusIcon"></i>
                    <span id="statusText">متاح</span>
                </div>
                <button class="dark-mode-toggle" id="darkModeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="tabs-container" id="topTabs">
            <div class="tab active" data-tab="home">الرئيسية</div>
            <div class="tab" data-tab="images">الصور</div>
            <div class="tab" data-tab="quizzes">الاختبارات</div>
            <div class="tab" data-tab="stats">إحصائيات</div>
            <div class="tab" data-tab="favorites">المفضلة</div>
        </div>

        <!-- منطقة المحتوى -->
        <div class="content-area" id="contentArea"></div>

        <!-- الشريط السفلي -->
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item" data-nav="images"><i class="fas fa-images"></i><span>الصور</span></div>
            <div class="nav-item" data-nav="quizzes"><i class="fas fa-question-circle"></i><span>اختبارات</span></div>
            <div class="nav-item" data-nav="stats"><i class="fas fa-chart-bar"></i><span>إحصائيات</span></div>
            <div class="nav-item" data-nav="favorites"><i class="fas fa-heart"></i><span>المفضلة</span></div>
        </div>
    </div>

    <!-- زر التثبيت العائم -->
    <button class="pwa-install-btn" id="pwaInstallBtn" style="display: none;">
        <i class="fas fa-download"></i>
    </button>

    <script>
        (function() {
            // ===== الشروحات الكاملة للصور التسعة =====
            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            // شرح الصورة 1: مقدمة في التشريح
            const explanation1 = `# الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## 1. علم التشريح (Anatomy)
هو العلم الذي يدرس بنية الجسم والعلاقات بين أجزائه المختلفة.

### أنواع التشريح:
• التشريح العياني (Gross anatomy): دراسة التراكيب التي يمكن رؤيتها بالعين المجردة
• التشريح المجهري (Microscopic anatomy): دراسة التراكيب الدقيقة تحت المجهر

## 2. علم وظائف الأعضاء (Physiology)
هو العلم الذي يدرس كيفية عمل أجزاء الجسم ووظائفها الحيوية.

## 3. الأنسجة (Tissues)

            function renderHome() {
                const studied = studiedImages.filter(v => v).length;
                const correctAnswers = quizScores.filter(s => s === true).length;
                const totalQuestions = quizQuestions.length;
                const scorePercent = Math.round((correctAnswers / totalQuestions) * 100) || 0;
                
                return `
                    <div class="dedication-card">
                        <div style="font-size: 20px;">🕊️</div>
                        <div class="dedication-name">ياسر عطيه المصري (ابو مصعب)</div>
                        <div class="dedication-dua">
                            <i class="fas fa-quote-right"></i>
                            اللهم ارحمه واغفر له وأسكنه الفردوس الأعلى
                            <i class="fas fa-quote-left"></i>
                        </div>
                    </div>

                    <div class="welcome-card">
                        <div class="welcome-text">أهلاً بك</div>
                        <div class="start-text">ابدأ رحلة التعلم</div>
                    </div>

                    <div class="search-container">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="ابحث عن أي مصطلح..." autocomplete="off">
                        </div>
                        <div class="search-results" id="searchResults"></div>
                    </div>

                    <div class="images-grid" id="homeImageGrid">
                        ${imageFiles.map((_, i) => `
                            <div class="image-card" onclick="App.changeImage(${i})">
                                <div class="image-icon">🫀</div>
                                <div class="image-label">صورة ${i + 1}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${studied}</div>
                            <div class="stat-label">صور درستها</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${favorites.length}</div>
                            <div class="stat-label">المفضلة</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${scorePercent}%</div>
                            <div class="stat-label">الاختبارات</div>
                        </div>
                    </div>
                `;
            }

            // ===== صفحة الصور =====
            function renderImages() {
                return `
                    <div class="image-container" id="imageContainer">
                        <img id="mainImage" src="${imageFiles[currentIndex]}" alt="صورة تشريحية">
                        <div class="touch-overlay" id="touchOverlay"></div>
                        <div class="zoom-level" id="zoomLevel">1.0x</div>
                    </div>

                    <div class="control-panel">
                        <button class="ctrl-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
                        <button class="ctrl-btn reset" id="zoomReset"><i class="fas fa-undo-alt"></i></button>
                        <button class="ctrl-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
                        <button class="ctrl-btn fullscreen" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                    </div>

                    <div class="action-bar">
                        <button class="action-btn ${favorites.includes(currentIndex) ? 'favorite' : ''}" id="favoriteBtn">
                            <i class="fas fa-heart"></i> مفضلة
                        </button>
                        <button class="action-btn" id="downloadBtn">
                            <i class="fas fa-download"></i> تحميل
                        </button>
                        <button class="action-btn" id="speakBtn">
                            <i class="fas fa-volume-up"></i> استماع
                        </button>
                    </div>

                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="App.changeImage(${currentIndex - 1})" ${currentIndex === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-right"></i> السابقة
                        </button>
                        <button class="nav-btn next" onclick="App.changeImage(${currentIndex + 1})" ${currentIndex === imageFiles.length - 1 ? 'disabled' : ''}>
                            التالية <i class="fas fa-arrow-left"></i>
                        </button>
                    </div>

                    <div class="explanation-section">
                        <div class="section-title">
                            <i class="fas fa-book-open"></i> شرح الصورة ${currentIndex + 1}
                        </div>
                        <div class="explanation-content">
                            ${explanations[currentIndex].replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
            }

            // ===== صفحة الاختبارات =====
            function renderQuizzes() {
                const correctAnswers = quizScores.filter(s => s === true).length;
                const totalQuestions = quizQuestions.length;
                const scorePercent = Math.round((correctAnswers / totalQuestions) * 100) || 0;
                
                let html = `
                    <div class="quiz-container">
                        <div class="quiz-header">
                            <div class="quiz-title">📝 اختبارات مودل</div>
                            <div class="quiz-score-badge">${scorePercent}%</div>
                        </div>
                        
                        <div class="quiz-progress">
                            <div class="progress-text">
                                <span>تقدمك: ${correctAnswers}/${totalQuestions}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${scorePercent}%"></div>
                            </div>
                        </div>
                `;

                quizQuestions.forEach((q, i) => {
                    const answered = quizAnswers[i] !== null;
                    const isCorrect = quizScores[i] === true;
                    
                    html += `
                        <div class="quiz-question">${i + 1}. ${q.question}</div>
                        <div class="quiz-options">
                    `;
                    
                    q.options.forEach((opt, j) => {
                        const isSelected = quizAnswers[i] === j;
                        const isCorrectOpt = j === q.correct;
                        
                        let optionClass = 'quiz-option';
                        if (answered) {
                            if (isCorrectOpt) optionClass += ' correct';
                            if (isSelected && !isCorrectOpt) optionClass += ' wrong';
                        }
                        
                        html += `
                            <div class="${optionClass}" 
                                 onclick="App.answerQuiz(${i}, ${j}, ${j === q.correct})"
                                 ${answered ? 'style="pointer-events: none;"' : ''}>
                                ${opt}
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                    
                    if (answered) {
                        html += `
                            <div class="quiz-feedback">
                                <div style="font-weight: 700; margin-bottom: 5px;">
                                    ${isCorrect ? '✅ إجابة صحيحة' : '❌ إجابة خاطئة'}
                                </div>
                                <div class="quiz-explanation">
                                    ${q.explanation}
                                </div>
                            </div>
                        `;
                    }
                });

                html += `
                        <button class="quiz-reset-btn" onclick="App.resetQuiz()">
                            <i class="fas fa-redo-alt"></i> إعادة الاختبار
                        </button>
                    </div>
                `;

                return html;
            }

            // ===== صفحة الإحصائيات =====
            function renderStats() {
                const studied = studiedImages.filter(v => v).length;
                const studiedPercent = Math.round((studied / imageFiles.length) * 100);
                const favoritePercent = Math.round((favorites.length / imageFiles.length) * 100);
                const correctAnswers = quizScores.filter(s => s === true).length;
                const quizPercent = Math.round((correctAnswers / quizQuestions.length) * 100) || 0;

                return `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${studied}</div>
                            <div class="stat-label">صور درستها</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${favorites.length}</div>
                            <div class="stat-label">المفضلة</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${quizPercent}%</div>
                            <div class="stat-label">الاختبارات</div>
                        </div>
                    </div>

                    <div class="progress-card">
                        <div class="progress-text">
                            <span>📚 تقدم الدراسة</span>
                            <span>${studiedPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${studiedPercent}%"></div>
                        </div>
                    </div>

                    <div class="progress-card">
                        <div class="progress-text">
                            <span>❤️ المفضلة</span>
                            <span>${favoritePercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${favoritePercent}%; background: #ff6b6b;"></div>
                        </div>
                    </div>

                    <div class="progress-card">
                        <div class="progress-text">
                            <span>📝 الاختبارات</span>
                            <span>${quizPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${quizPercent}%; background: #4caf50;"></div>
                        </div>
                    </div>
                `;
            }

            // ===== صفحة المفضلة =====
            function renderFavorites() {
                if (favorites.length === 0) {
                    return `
                        <div class="welcome-card" style="text-align: center;">
                            <div style="font-size: 50px; margin-bottom: 10px;">❤️</div>
                            <div class="welcome-text">لا توجد صور</div>
                            <div class="start-text">أضف صوراً للمفضلة</div>
                        </div>
                    `;
                }

                return `
                    <div class="images-grid">
                        ${favorites.map(index => `
                            <div class="image-card" onclick="App.changeImage(${index})">
                                <div class="image-icon">🫀</div>
                                <div class="image-label">صورة ${index + 1}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // ===== البحث المتطور =====
            function setupSearch() {
                const searchInput = document.getElementById('searchInput');
                const searchResults = document.getElementById('searchResults');
                
                if (!searchInput) return;
                
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.trim();
                    
                    if (query.length < 2) {
                        searchResults.classList.remove('active');
                        return;
                    }
                    
                    const results = App.search(query);
                    
                    if (results.length > 0) {
                        let html = '';
                        results.forEach(r => {
                            html += `
                                <div class="search-result-item" onclick="App.changeImage(${r.index})">
                                    <div class="result-icon">🫀</div>
                                    <div class="result-info">
                                        <div class="result-title">${r.title}</div>
                                        <div class="result-match">${r.match.substring(0, 60)}...</div>
                                    </div>
                                </div>
                            `;
                        });
                        searchResults.innerHTML = html;
                        searchResults.classList.add('active');
                    } else {
                        searchResults.innerHTML = '<div style="padding: 15px; text-align: center;">لا توجد نتائج</div>';
                        searchResults.classList.add('active');
                    }
                });
                
                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                        searchResults.classList.remove('active');
                    }
                });
            }

            // ===== تهيئة عناصر الصورة =====
            function initImageElements() {
                const touchOverlay = document.getElementById('touchOverlay');
                if (!touchOverlay) return;

                const touchStart = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && scale > 1) {
                        isPanning = true;
                        lastPanX = touches[0].clientX - panX;
                        lastPanY = touches[0].clientY - panY;
                    } else if (touches.length === 1) {
                        startX = touches[0].clientX;
                    }
                    
                    if (touches.length === 2) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        initialDistance = Math.sqrt(dx * dx + dy * dy);
                    }
                };

                const touchMove = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && isPanning && scale > 1) {
                        panX = touches[0].clientX - lastPanX;
                        panY = touches[0].clientY - lastPanY;
                        
                        const maxPan = 100 * (scale - 1);
                        panX = Math.min(maxPan, Math.max(-maxPan, panX));
                        panY = Math.min(maxPan, Math.max(-maxPan, panY));
                        
                        updateImageTransform();
                    } else if (touches.length === 2 && initialDistance > 0) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        const currentDistance = Math.sqrt(dx * dx + dy * dy);
                        const newScale = scale * (currentDistance / initialDistance);
                        scale = Math.min(maxScale, Math.max(minScale, newScale));
                        updateImageTransform();
                        initialDistance = currentDistance;
                    }
                };

                const touchEnd = (e) => {
                    const touches = e.touches;
                    
                    if (touches.length === 0) {
                        if (isPanning) {
                            isPanning = false;
                        } else {
                            const endX = e.changedTouches[0].clientX;
                            const diff = endX - startX;
                            
                            if (Math.abs(diff) > 60 && scale === 1) {
                                if (diff > 0 && currentIndex > 0) {
                                    App.changeImage(currentIndex - 1);
                                } else if (diff < 0 && currentIndex < imageFiles.length - 1) {
                                    App.changeImage(currentIndex + 1);
                                }
                            }
                        }
                    }
                    
                    if (touches.length < 2) initialDistance = 0;
                    
                    const currentTime = new Date().getTime();
                    if (currentTime - lastTap < 300) {
                        if (scale > 1.5) {
                            scale = 1;
                            panX = 0;
                            panY = 0;
                        } else {
                            scale = 2.5;
                        }
                        updateImageTransform();
                    }
                    lastTap = currentTime;
                };

                touchOverlay.addEventListener('touchstart', touchStart, { passive: false });
                touchOverlay.addEventListener('touchmove', touchMove, { passive: false });
                touchOverlay.addEventListener('touchend', touchEnd);
                touchOverlay.addEventListener('touchcancel', touchEnd);
            }

            function updateImageTransform() {
                const img = document.getElementById('mainImage');
                if (img) {
                    img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                }
                const zoomLevel = document.getElementById('zoomLevel');
                if (zoomLevel) zoomLevel.textContent = scale.toFixed(1) + 'x';
            }

            // ===== أحداث النقر =====
            function setupClickHandlers() {
                document.addEventListener('click', (e) => {
                    if (e.target.closest('#zoomIn')) {
                        scale = Math.min(maxScale, scale + 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomOut')) {
                        scale = Math.max(minScale, scale - 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomReset')) {
                        scale = 1;
                        panX = 0;
                        panY = 0;
                        updateImageTransform();
                    } else if (e.target.closest('#fullscreenBtn')) {
                        const container = document.getElementById('imageContainer');
                        if (container.requestFullscreen) {
                            container.requestFullscreen();
                        }
                    } else if (e.target.closest('#favoriteBtn')) {
                        const btn = e.target.closest('#favoriteBtn');
                        const index = favorites.indexOf(currentIndex);
                        if (index === -1) {
                            favorites.push(currentIndex);
                            btn.classList.add('favorite');
                        } else {
                            favorites.splice(index, 1);
                            btn.classList.remove('favorite');
                        }
                        updateStats();
                    } else if (e.target.closest('#downloadBtn')) {
                        const link = document.createElement('a');
                        link.href = imageFiles[currentIndex];
                        link.download = imageFiles[currentIndex];
                        link.click();
                    } else if (e.target.closest('#speakBtn')) {
                        const text = explanations[currentIndex].substring(0, 200);
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'ar-SA';
                        window.speechSynthesis.speak(utterance);
                    }
                });
            }

            // ===== التخزين المحلي للصور =====
            function cacheImages() {
                if ('caches' in window) {
                    caches.open('anatomy-v1').then(cache => {
                        imageFiles.forEach(img => {
                            fetch(img).then(response => {
                                if (response.ok) {
                                    cache.put(img, response);
                                }
                            }).catch(() => {});
                        });
                    });
                }
            }

            // ===== التهيئة =====
            function init() {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                    darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
                
                darkModeToggle.addEventListener('click', () => {
                    darkMode = !darkMode;
                    document.body.classList.toggle('dark-mode', darkMode);
                    darkModeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                    updateStats();
                });

                topTabs.forEach(tab => {
                    tab.addEventListener('click', () => renderContent(tab.dataset.tab));
                });

                bottomNavItems.forEach(item => {
                    item.addEventListener('click', () => renderContent(item.dataset.nav));
                });

                setupClickHandlers();

                // تحميل الصور للتخزين المحلي
                cacheImages();

                // عرض المحتوى
                renderContent('home');
                
                // تفعيل البحث بعد تحميل الصفحة
                setTimeout(() => {
                    setupSearch();
                }, 500);

                // حفظ الجلسة
                setInterval(updateStats, 5000);
                
                // إظهار حالة عدم الاتصال
                statusText.textContent = 'بدون إنترنت';
            }

            init();
        })();
    </script>
</body>
</html>
