<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التشريح - بدون إنترنت</title>
    <style>
        /* ألوان مريحة للطلاب */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f0f5f7;
            color: #1d4a55;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* رأس الموقع */
        .header {
            background: #0d4f5c;
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(5, 60, 70, 0.4);
            border: 1px solid #57b8b0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .logo p {
            font-size: 15px;
            opacity: 0.9;
        }

        /* مؤشر التخزين الدائم */
        .storage-badge {
            background: #207a88;
            padding: 12px 25px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #9de0d8;
            font-weight: 500;
        }

        /* شريط التحميل */
        .progress-section {
            background: white;
            border-radius: 60px;
            padding: 15px 25px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,40,45,0.1);
        }

        .progress-bar {
            height: 16px;
            background: #e1f0ec;
            border-radius: 40px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: #0d4f5c;
            width: 0%;
            transition: width 0.4s;
            border-radius: 40px;
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1c656e;
            font-size: 16px;
        }

        /* شبكة الصور */
        .image-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .image-btn {
            width: 85px;
            height: 95px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,45,50,0.1);
            border: 3px solid transparent;
            transition: 0.2s;
            font-weight: 600;
            color: #0d4f5c;
        }

        .image-btn.active {
            border-color: #0d4f5c;
            background: #daf2ed;
            transform: scale(0.98);
        }

        .image-btn span {
            font-size: 28px;
        }

        /* منطقة العرض */
        .main-area {
            background: white;
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 20px 35px rgba(0,55,60,0.15);
            border: 1px solid #bbe6df;
        }

        .split-panel {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 25px;
        }

        /* الصورة */
        .image-frame {
            background: #10353b;
            border-radius: 45px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 5px solid #bde8e0;
            position: relative;
        }

        #displayImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #10353b;
            display: block;
        }

        .zoom-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 8px 18px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            border: 1px solid #7fc9c0;
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .zoom-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* بطاقة النص */
        .info-panel {
            background: #f3fcf9;
            border-radius: 45px;
            padding: 25px;
            border: 1px solid #bae1d9;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .info-header h2 {
            color: #0d4f5c;
            font-size: 24px;
        }

        .filename {
            background: #0d4f5c;
            color: white;
            padding: 8px 25px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
        }

        .notes-box {
            background: white;
            border-radius: 35px;
            padding: 22px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.8;
            border: 1px solid #cbede4;
            white-space: pre-line;
            font-size: 15px;
        }

        /* أزرار التحميل */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: white;
            border: 2px solid #0d4f5c;
            padding: 12px 10px;
            border-radius: 50px;
            font-weight: 600;
            color: #0d4f5c;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 110px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #0d4f5c;
            color: white;
        }

        /* رسائل الخطأ */
        .error-message {
            background: #ffebe6;
            border: 2px solid #d14c4c;
            color: #a13737;
            padding: 15px 25px;
            border-radius: 60px;
            margin: 20px 0 0;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        /* تذييل */
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #578e94;
            padding: 10px;
        }

        @media (max-width: 900px) {
            .split-panel {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <div class="logo">
                <div>
                    <h1>📚 أطلس التشريح</h1>
                    <p>للطلاب - تخزين دائم بدون إنترنت</p>
                </div>
            </div>
            <div class="storage-badge" id="storageStatus">
                <span>💾</span>
                <span id="statusText">جاري التثبيت...</span>
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-section" id="progressSection">
            <div class="status-text">
                <span id="statusIcon">🔄</span>
                <span id="statusMessage">يتم تحميل الموارد وتخزينها...</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="display: flex; justify-content: space-between; color: #0d4f5c;">
                <span id="loadedCount">0</span>
                <span>/</span>
                <span id="totalCount">9</span>
                <span style="margin-right: auto;">صورة</span>
            </div>
        </div>

        <!-- أيقونات الصور -->
        <div class="image-grid" id="imageGrid"></div>

        <!-- العرض الرئيسي -->
        <div class="main-area">
            <div class="split-panel">
                <!-- الصورة -->
                <div class="image-frame">
                    <img id="displayImage" src="" alt="صورة تشريحية">
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomIn">+</button>
                        <button class="zoom-btn" id="zoomOut">−</button>
                        <button class="zoom-btn" id="zoomReset">↺</button>
                    </div>
                </div>

                <!-- النص -->
                <div class="info-panel">
                    <div class="info-header">
                        <h2>📝 شرح الصورة</h2>
                        <span class="filename" id="filename">1.jpg</span>
                    </div>
                    <div class="notes-box" id="notesContent">
                        جاري التحميل من التخزين الدائم...
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" id="downloadImage">
                            <span>📷</span> تحميل الصورة
                        </button>
                        <button class="action-btn" id="downloadText">
                            <span>📄</span> تحميل النص
                        </button>
                        <button class="action-btn" id="copyLink">
                            <span>🔗</span> نسخ الرابط
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMsg">
            <span>⚠️</span>
            <span id="errorText"></span>
        </div>

        <!-- تذييل -->
        <div class="footer">
            <p id="footerText">⚡ يعمل بدون إنترنت بعد التحميل الأول</p>
        </div>
    </div>

    <!-- Service Worker للتخزين الدائم -->
    <script>
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✓ Service Worker مسجل'))
                .catch(err => console.log('✗ Service Worker فشل:', err));
        }

        // البيانات النصية للصور (مخزنة محلياً)
        const notesData = [
            `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY

## Anatomy | علم التشريح
Anatomy is the study of body structure.

## Physiology | علم وظائف الأعضاء
Physiology is the study of body function.

### Tissues | الأنسجة
- Epithelial tissue / نسيج طلائي
- Connective tissue / نسيج ضام
- Muscle tissue / نسيج عضلي
- Nerve tissue / نسيج عصبي`,

            `# ANATOMICAL DIRECTIONAL TERMS

## Superior (cranial) | علوي
The head is superior to the neck.

## Inferior (caudal) | سفلي
The stomach is inferior to the heart.

## Anterior (ventral) | أمامي
The chest is anterior to the spine.

## Posterior (dorsal) | خلفي
The spine is posterior to the heart.

## Medial | إنسي
The nose is medial to the eyes.

## Lateral | وحشي
The ears are lateral to the head.`,

            `# BODY REGIONS | مناطق الجسم

## Head and Neck | الرأس والرقبة
- Cranial / قحفي
- Facial / وجهي
- Cervical / عنقي

## Trunk | الجذع
- Thoracic / صدري
- Abdominal / بطني
- Pelvic / حوضي

## Upper Limb | الطرف العلوي
- Shoulder / كتف
- Arm / عضد
- Forearm / ساعد

## Lower Limb | الطرف السفلي
- Thigh / فخذ
- Leg / ساق
- Foot / قدم`,

            `# LEVELS OF ORGANIZATION

## 1. Chemical Level
Atoms → Molecules (H₂O, DNA)

## 2. Cellular Level
Cells (muscle cells, nerve cells)

## 3. Tissue Level
Tissues (epithelial, connective)

## 4. Organ Level
Organs (heart, liver, brain)

## 5. System Level
Systems (respiratory, digestive)

## 6. Organism Level
The whole human body`,

            `# ABDOMINAL REGIONS

## Nine Regions | 9 مناطق
- Right hypochondriac
- Epigastric
- Left hypochondriac
- Right lumbar
- Umbilical
- Left lumbar
- Right iliac
- Hypogastric
- Left iliac

## Four Quadrants | 4 أرباع
- Right Upper Quadrant
- Left Upper Quadrant
- Right Lower Quadrant
- Left Lower Quadrant`,

            `# BODY CAVITIES

## Dorsal Cavity | التجويف الخلفي
- Cranial cavity (brain)
- Spinal cavity (spinal cord)

## Ventral Cavity | التجويف الأمامي
- Thoracic cavity (heart, lungs)
- Abdominal cavity (digestive organs)
- Pelvic cavity (bladder, reproductive)

## Diaphragm | الحجاب الحاجز
Separates thoracic and abdominal cavities`,

            `# HOMEOSTASIS

## Definition
Maintenance of stable internal environment

## Components
- Receptor: detects change
- Control center: processes information
- Effector: responds to change

## Negative Feedback
Returns body to normal state
Example: Body temperature regulation

## Positive Feedback
Amplifies change
Example: Childbirth contractions`,

            `# NEGATIVE FEEDBACK EXAMPLES

## Blood Glucose Regulation
High glucose → Insulin released → Glucose decreases
Low glucose → Glucagon released → Glucose increases

## Body Temperature
Hot → Sweating → Cooling
Cold → Shivering → Warming

## Blood Pressure
High pressure → Heart rate slows
Low pressure → Heart rate increases`,

            `# REVIEW - Anatomical Position

## Standard Position
- Standing upright
- Face forward
- Arms at sides
- Palms forward

## Directional Terms Summary
Superior/Inferior: above/below
Anterior/Posterior: front/back
Medial/Lateral: toward midline/away
Proximal/Distal: closer/farther
Superficial/Deep: surface/internal`
        ];

        // أسماء الصور
        const imageFiles = [
            '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
            '6.jpg', '7.jpg', '8.jpg', '9.jpg'
        ];

        // متغيرات الحالة
        let currentIndex = 0;
        let zoom = 1;
        let loadedImages = 0;
        const totalImages = imageFiles.length;

        // عناصر DOM
        const imageGrid = document.getElementById('imageGrid');
        const displayImage = document.getElementById('displayImage');
        const filename = document.getElementById('filename');
        const notesContent = document.getElementById('notesContent');
        const progressFill = document.getElementById('progressFill');
        const loadedCountSpan = document.getElementById('loadedCount');
        const statusMessage = document.getElementById('statusMessage');
        const statusIcon = document.getElementById('statusIcon');
        const storageStatus = document.getElementById('statusText');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        // بناء أزرار الصور
        function buildImageButtons() {
            imageGrid.innerHTML = '';
            for (let i = 0; i < imageFiles.length; i++) {
                const btn = document.createElement('div');
                btn.className = `image-btn ${i === 0 ? 'active' : ''}`;
                btn.setAttribute('data-index', i);
                btn.innerHTML = `<span>${i + 1}</span><small>صورة</small>`;
                btn.onclick = () => changeImage(i);
                imageGrid.appendChild(btn);
            }
        }

        // تغيير الصورة
        function changeImage(index) {
            if (index < 0 || index >= imageFiles.length) return;
            
            currentIndex = index;
            
            // محاولة تحميل الصورة من cache
            if (navigator.onLine) {
                displayImage.src = imageFiles[index];
            } else {
                // إذا كنا أوفلاین، نجرب من cache
                displayImage.src = imageFiles[index];
            }
            
            filename.innerText = imageFiles[index];
            notesContent.innerText = notesData[index];
            
            // تحديث الأزرار
            document.querySelectorAll('.image-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            // تحديث الرابط
            window.location.hash = `img-${index + 1}`;
            
            // إعادة التكبير
            zoom = 1;
            displayImage.style.transform = `scale(${zoom})`;
            
            errorMsg.style.display = 'none';
        }

        // تحديث شريط التقدم
        function updateProgress() {
            loadedImages++;
            const percent = (loadedImages / totalImages) * 100;
            progressFill.style.width = percent + '%';
            loadedCountSpan.innerText = loadedImages;
            
            if (loadedImages >= totalImages) {
                statusMessage.innerText = '✓ جميع الصور مخزنة في التخزين الدائم';
                statusIcon.innerText = '✅';
                storageStatus.innerText = '✅ متاح بدون إنترنت';
                document.getElementById('footerText').innerHTML = '✅ الموقع يعمل بدون إنترنت الآن - جميع الصور محفوظة';
                
                // تخزين النصوص في localStorage
                localStorage.setItem('notes_data', JSON.stringify(notesData));
                localStorage.setItem('images_ready', 'true');
            }
        }

        // التحقق من الصور في cache
        async function checkCachedImages() {
            if ('caches' in window) {
                const cache = await caches.open('anatomy-v1');
                
                for (let i = 0; i < imageFiles.length; i++) {
                    const response = await cache.match(imageFiles[i]);
                    if (response) {
                        updateProgress();
                    } else {
                        // إذا الصورة مش في cache، نحملها
                        fetch(imageFiles[i])
                            .then(() => updateProgress())
                            .catch(() => {
                                loadedImages++;
                                updateProgress();
                            });
                    }
                }
            }
        }

        // معالجة أخطاء الصورة
        displayImage.onerror = function() {
            if (!navigator.onLine) {
                errorText.innerText = '⚠️ أنت بدون إنترنت والصورة غير مخزنة محلياً';
                errorMsg.style.display = 'flex';
            }
        };

        displayImage.onload = function() {
            errorMsg.style.display = 'none';
        };

        // أزرار التحكم
        document.getElementById('zoomIn').onclick = () => {
            zoom = Math.min(zoom + 0.2, 3);
            displayImage.style.transform = `scale(${zoom})`;
        };

        document.getElementById('zoomOut').onclick = () => {
            zoom = Math.max(zoom - 0.2, 0.5);
            displayImage.style.transform = `scale(${zoom})`;
        };

        document.getElementById('zoomReset').onclick = () => {
            zoom = 1;
            displayImage.style.transform = `scale(${zoom})`;
        };

        // تحميل الصورة
        document.getElementById('downloadImage').onclick = () => {
            const link = document.createElement('a');
            link.href = imageFiles[currentIndex];
            link.download = imageFiles[currentIndex];
            link.click();
        };

        // تحميل النص
        document.getElementById('downloadText').onclick = () => {
            const text = notesData[currentIndex];
            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `notes_${currentIndex + 1}.txt`;
            link.click();
        };

        // نسخ الرابط
        document.getElementById('copyLink').onclick = () => {
            const url = window.location.href.split('#')[0] + `#img-${currentIndex + 1}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ تم نسخ الرابط');
            });
        };

        // معالجة الرابط
        function handleHash() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#img-')) {
                const num = parseInt(hash.replace('#img-', ''));
                if (num >= 1 && num <= imageFiles.length) {
                    changeImage(num - 1);
                }
            }
        }

        // حفظ الجلسة
        function saveSession() {
            localStorage.setItem('last_image', currentIndex);
        }

        // بدء التطبيق
        function init() {
            buildImageButtons();
            handleHash();
            
            // استعادة آخر صورة
            const lastImage = localStorage.getItem('last_image');
            if (lastImage && !window.location.hash) {
                changeImage(parseInt(lastImage));
            }
            
            // التحقق من التخزين
            if (localStorage.getItem('images_ready') === 'true') {
                statusMessage.innerText = '✓ الموارد متاحة محلياً';
                storageStatus.innerText = '✅ متاح بدون إنترنت';
                progressFill.style.width = '100%';
                loadedCountSpan.innerText = totalImages;
            }
            
            // بدء تحميل الصور للتخزين
            checkCachedImages();
            
            // حفظ الجلسة كل 5 ثواني
            setInterval(saveSession, 5000);
        }

        init();
    </script>
</body>
</html>
