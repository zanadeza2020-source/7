<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تشريح • التطبيق التعليمي</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== إعدادات أساسية ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5fafc;
            color: #1e4d58;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            background: #1a2a30;
            color: #e0f0f0;
        }

        body.dark-mode .app-container {
            background: #1e333a;
        }

        body.dark-mode .top-nav {
            background: #0e3f48;
            border-bottom-color: #3d6b6b;
        }

        body.dark-mode .card {
            background: #1d363b;
            border-color: #3d6f6f;
        }

        body.dark-mode .bottom-nav {
            background: #0e3f48;
            border-top-color: #3d6b6b;
        }

        body.dark-mode .nav-item {
            color: #9fc5c5;
        }

        body.dark-mode .nav-item.active {
            color: #ffdb9c;
        }

        body.dark-mode .search-box {
            background: #1d3a3f;
            border-color: #3d9b9b;
        }

        body.dark-mode .search-box input {
            color: #e0f0f0;
        }

        body.dark-mode .explanation-box {
            background: #1d363b;
            border-color: #3d6f6f;
            color: #d0ece5;
        }

        /* ===== كلاس hidden ===== */
        .hidden {
            display: none !important;
        }

        /* ===== حاوية التطبيق ===== */
        .app-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
            overflow: hidden;
        }

        /* ===== الشريط العلوي ===== */
        .top-nav {
            background: #16636f;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffdb9c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            background: #22818f;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dark-mode-toggle {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        /* ===== منطقة المحتوى الرئيسية ===== */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            background: #f8fcfd;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== التبويبات العلوية ===== */
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: #16636f;
            border: 2px solid #16636f;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tab.active {
            background: #16636f;
            color: white;
        }

        /* ===== بطاقات المحتوى ===== */
        .card {
            background: white;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(0,50,60,0.05);
            border: 1px solid #d4ece5;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #16636f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== شريط البحث ===== */
        .search-box {
            background: white;
            border-radius: 40px;
            padding: 4px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            border: 2px solid #16636f;
        }

        .search-box i {
            color: #16636f;
            font-size: 16px;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            background: transparent;
        }

        /* ===== شبكة الأيقونات ===== */
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .icon-item {
            width: 65px;
            height: 70px;
            background: white;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: 0.2s;
            position: relative;
        }

        .icon-item.favorite::after {
            content: '❤️';
            position: absolute;
            top: -3px;
            left: -3px;
            font-size: 12px;
        }

        .icon-item.active {
            border-color: #16636f;
            background: #e1f6f2;
        }

        .icon-item i {
            font-size: 22px;
            color: #16636f;
        }

        .icon-item span {
            font-size: 12px;
            font-weight: 600;
            color: #1a5f6b;
            background: #edf9f5;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* ===== حاوية الصورة ===== */
        .image-container {
            background: #12363d;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid #c6ece3;
            position: relative;
            margin-bottom: 16px;
            touch-action: none;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #12363d;
            display: block;
            transition: transform 0.2s ease-out;
            transform-origin: center center;
        }

        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            touch-action: none;
        }

        .zoom-controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:active {
            background: #16636f;
        }

        .zoom-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 11px;
            z-index: 15;
        }

        /* ===== شروحات الصور ===== */
        .explanation-box {
            background: #f6fdfb;
            border-radius: 22px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid #c0e6dd;
            white-space: pre-line;
            scrollbar-width: thin;
        }

        .explanation-title {
            color: #16636f;
            font-weight: 700;
            margin: 12px 0 8px;
            font-size: 15px;
        }

        /* ===== أزرار الإجراءات ===== */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 70px;
            background: white;
            border: 1.5px solid #16636f;
            padding: 8px 5px;
            border-radius: 40px;
            font-weight: 600;
            color: #16636f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            transition: 0.2s;
        }

        .action-btn:active {
            background: #16636f;
            color: white;
        }

        .action-btn.favorite-active {
            background: #ff6b6b;
            border-color: #ff3b3b;
            color: white;
        }

        .action-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== بطاقة الاختبار ===== */
        .quiz-card {
            background: white;
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 16px;
            border: 2px solid #16636f;
        }

        .quiz-question {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .quiz-option {
            background: #f0f7fa;
            padding: 10px;
            border-radius: 22px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            font-size: 13px;
        }

        .quiz-option:hover {
            border-color: #16636f;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .quiz-option.wrong {
            background: #ff6b6b;
            color: white;
            border-color: #d32f2f;
        }

        .quiz-feedback {
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            padding: 8px;
            border-radius: 30px;
            background: #f0f7fa;
        }

        .quiz-reset-btn {
            background: #16636f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* ===== بطاقة الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #f0f7fa;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 22px;
            font-weight: 800;
            color: #16636f;
        }

        .stat-label {
            font-size: 11px;
            color: #4f7a7a;
        }

        .progress-bar {
            height: 8px;
            background: #e1f0ec;
            border-radius: 20px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: #16636f;
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* ===== الشريط السفلي ===== */
        .bottom-nav {
            background: #16636f;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 8px;
            border-top: 2px solid #ffdb9c;
            color: white;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
            transition: 0.2s;
            color: #b0d8d8;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }

        .nav-item.active {
            color: #ffdb9c;
            background: rgba(255,255,255,0.1);
        }

        /* ===== رسالة الخطأ ===== */
        .error-message {
            background: #ffede5;
            border: 1.5px solid #c95a5a;
            color: #a13b3b;
            padding: 12px 20px;
            border-radius: 45px;
            margin: 15px 0;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        /* ===== مؤشر التحميل ===== */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(22,99,111,0.2);
            border-radius: 50%;
            border-top-color: #16636f;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== تحسينات ===== */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #16636f;
            margin: 16px 0 8px;
        }

        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .text-center { text-align: center; }
    </style>
</head>

    <script>
        (function() {
            // ===== بيانات الصور والشروحات =====
            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            const explanations = [
                // الصورة 1 - مقدمة في التشريح
                `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY
الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is the study of body structure. يركز هذا العلم على دراسة بنية الجسم والعلاقات بين أجزائه المختلفة.

## Physiology | علم وظائف الأعضاء
Physiology is the study of body function. يركز على دراسة كيفية عمل أجزاء الجسم.

## The study of anatomy | دراسة التشريح
• Gross anatomy (التشريح العياني): دراسة تراكيب الجسم بالعين المجردة
• Microscopic anatomy (التشريح المجهري): دراسة التراكيب الدقيقة

## TISSUE | الأنسجة
• Epithelial tissue / نسيج طلائي
• Connective tissue / نسيج ضام
• Muscle tissue / نسيج عضلي
• Nerve tissue / نسيج عصبي

## LEVEL OF STRUCTURAL ORGANIZATION | مستويات التنظيم
1. Chemical level: Atoms → Molecules (H₂O, CO₂)
2. Cellular level: Cells (Nucleus, Mitochondria)
3. Tissue level: Tissues
4. Organ level: Organs (Stomach, Heart)
5. System level: Systems (Respiratory System)
6. Organism level: Human body`,

                // الصورة 2 - المصطلحات الاتجاهية
                `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية

## Superior (cranial) | العلوي (القحفي)
Toward the head end. مثال: الرأس علوي بالنسبة للبطن

## Inferior (caudal) | السفلي (الذيلي)
Away from the head. مثال: السرة سفلية بالنسبة للذقن

## Anterior (ventral) | الأمامي (البطني)
Toward the front. مثال: عظمة القص أمامية للعمود الفقري

## Posterior (dorsal) | الخلفي (الظهري)
Toward the back. مثال: القلب خلفي لعظمة القص

## Medial | الإنسي
Toward the midline. مثال: القلب إنسي للذراع

## Lateral | الوحشي
Away from the midline. مثال: الذراعان وحشيان للصدر

## Proximal | الداني
Closer to attachment. مثال: الكوع داني للمعصم

## Distal | القاصي
Farther from attachment. مثال: الركبة قاصية للفخذ`,

                // الصورة 3 - مناطق الجسم
                `# BODY REGIONS | مناطق الجسم

## Head | الرأس
• Cranial region (المنطقة القحفية): الجمجمة
• Facial region (المنطقة الوجهية): الوجه

## Neck | الرقبة
Cervical region (المنطقة العنقية)

## Trunk | الجذع
• Thoracic region (الصدر)
• Abdominal region (البطن)
• Pelvic region (الحوض)
• Vertebral region (الظهر)

## Upper Limb | الطرف العلوي
Shoulder, Arm, Forearm, Hand

## Lower Limb | الطرف السفلي
Thigh, Leg, Foot`,

                // الصورة 4 - مستويات التنظيم
                `# LEVELS OF ORGANIZATION | مستويات التنظيم

## 1. Chemical level | المستوى الكيميائي
Atoms → Molecules (H₂O, CO₂, O₂)

## 2. Cellular level | المستوى الخلوي
Cells: basic unit of life. تحتوي على نواة وميتوكوندريا

## 3. Tissue level | المستوى النسيجي
Groups of similar cells. أربعة أنواع رئيسية

## 4. Organ level | المستوى العضوي
Different tissues work together. مثل القلب والكبد

## 5. System level | مستوى الجهاز
Organs work together. مثل الجهاز القلبي الوعائي

## 6. Organism level | مستوى الكائن الحي
All systems working together

## Anatomical Position | الوضعية التشريحية
Standing erect, facing forward, palms forward`,

                // الصورة 5 - البطن ومستويات الجسم
                `# ABDOMINAL REGIONS | المناطق البطنية

## Nine Regions | تسع مناطق
1. Right hypochondriac (تحت الضلع الأيمن)
2. Epigastric (فوق المعدة)
3. Left hypochondriac (تحت الضلع الأيسر)
4. Right lumbar (قطني أيمن)
5. Umbilical (سري)
6. Left lumbar (قطني أيسر)
7. Right iliac (حرقفي أيمن)
8. Hypogastric (فوق العانة)
9. Left iliac (حرقفي أيسر)

## Four Quadrants | أربعة أرباع
• Right Upper Quadrant (RUQ)
• Left Upper Quadrant (LUQ)
• Right Lower Quadrant (RLQ)
• Left Lower Quadrant (LLQ)

## Body Planes | مستويات الجسم
• Sagittal: right and left halves
• Frontal: front and back
• Transverse: upper and lower`,

                // الصورة 6 - تجاويف الجسم
                `# BODY CAVITIES | تجاويف الجسم

## Thoracic Cavity | التجويف الصدري
Contains heart and lungs. يحتوي على القلب والرئتين
• Mediastinum (المنصف): contains heart, trachea, esophagus
• Pericardial cavity (التجويف التاموري): surrounds heart

## Abdominopelvic Cavity | التجويف البطني الحوضي
• Abdominal cavity (بطني): stomach, liver, intestines
• Pelvic cavity (حوضي): bladder, reproductive organs

## HOMEOSTASIS | الاتزان الداخلي

            // ===== تهيئة عناصر الصورة =====
            function initImageElements() {
                const touchOverlay = document.getElementById('touchOverlay');
                if (!touchOverlay) return;

                // إزالة المستمعات القديمة
                if (touchOverlay._listeners) {
                    touchOverlay._listeners.forEach(({type, handler}) => {
                        touchOverlay.removeEventListener(type, handler);
                    });
                }
                
                touchOverlay._listeners = [];

                // دوال اللمس
                const touchStart = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && scale > 1) {
                        isPanning = true;
                        lastPanX = touches[0].clientX - panX;
                        lastPanY = touches[0].clientY - panY;
                    } else if (touches.length === 1) {
                        startX = touches[0].clientX;
                    }
                    
                    if (touches.length === 2) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        initialDistance = Math.sqrt(dx * dx + dy * dy);
                    }
                };

                const touchMove = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && isPanning && scale > 1) {
                        panX = touches[0].clientX - lastPanX;
                        panY = touches[0].clientY - lastPanY;
                        
                        const maxPan = 100 * (scale - 1);
                        panX = Math.min(maxPan, Math.max(-maxPan, panX));
                        panY = Math.min(maxPan, Math.max(-maxPan, panY));
                        
                        updateImageTransform();
                    } else if (touches.length === 2 && initialDistance > 0) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        const currentDistance = Math.sqrt(dx * dx + dy * dy);
                        const newScale = scale * (currentDistance / initialDistance);
                        scale = Math.min(maxScale, Math.max(minScale, newScale));
                        updateImageTransform();
                        initialDistance = currentDistance;
                    }
                };

                const touchEnd = (e) => {
                    const touches = e.touches;
                    
                    if (touches.length === 0) {
                        if (isPanning) {
                            isPanning = false;
                        } else {
                            const endX = e.changedTouches[0].clientX;
                            const diff = endX - startX;
                            
                            if (Math.abs(diff) > 60 && scale === 1) {
                                if (diff > 0 && currentIndex > 0) {
                                    App.changeImage(currentIndex - 1);
                                } else if (diff < 0 && currentIndex < imageFiles.length - 1) {
                                    App.changeImage(currentIndex + 1);
                                }
                            }
                        }
                    }
                    
                    if (touches.length < 2) initialDistance = 0;
                    
                    const currentTime = new Date().getTime();
                    if (currentTime - lastTap < 300) {
                        if (scale > 1.5) {
                            scale = 1;
                            panX = 0;
                            panY = 0;
                        } else {
                            scale = 2.2;
                        }
                        updateImageTransform();
                    }
                    lastTap = currentTime;
                };

                // إضافة المستمعات
                touchOverlay.addEventListener('touchstart', touchStart, { passive: false });
                touchOverlay.addEventListener('touchmove', touchMove, { passive: false });
                touchOverlay.addEventListener('touchend', touchEnd);
                touchOverlay.addEventListener('touchcancel', touchEnd);
                touchOverlay.addEventListener('contextmenu', (e) => e.preventDefault());
                
                touchOverlay._listeners.push(
                    { type: 'touchstart', handler: touchStart },
                    { type: 'touchmove', handler: touchMove },
                    { type: 'touchend', handler: touchEnd },
                    { type: 'touchcancel', handler: touchEnd }
                );
            }

            function updateImageTransform() {
                const img = document.getElementById('mainImage');
                if (img) {
                    img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                }
                const zoomLevel = document.getElementById('zoomLevel');
                if (zoomLevel) zoomLevel.textContent = scale.toFixed(1) + 'x';
            }

            // ===== أحداث النقر =====
            function setupClickHandlers() {
                document.addEventListener('click', (e) => {
                    // أزرار التكبير
                    if (e.target.closest('#zoomIn')) {
                        scale = Math.min(maxScale, scale + 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomOut')) {
                        scale = Math.max(minScale, scale - 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomReset')) {
                        scale = 1;
                        panX = 0;
                        panY = 0;
                        updateImageTransform();
                    }
                    
                    // زر المفضلة
                    else if (e.target.closest('#favoriteBtn')) {
                        const btn = e.target.closest('#favoriteBtn');
                        const index = favorites.indexOf(currentIndex);
                        if (index === -1) {
                            favorites.push(currentIndex);
                            btn.classList.add('favorite-active');
                        } else {
                            favorites.splice(index, 1);
                            btn.classList.remove('favorite-active');
                        }
                        updateStats();
                    }
                    
                    // زر التحميل
                    else if (e.target.closest('#downloadBtn')) {
                        const link = document.createElement('a');
                        link.href = imageFiles[currentIndex];
                        link.download = imageFiles[currentIndex];
                        link.click();
                    }
                    
                    // زر الاستماع
                    else if (e.target.closest('#speakBtn')) {
                        const text = explanations[currentIndex].substring(0, 200);
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'ar-SA';
                        window.speechSynthesis.speak(utterance);
                    }
                    
                    // خيارات الاختبار
                    else if (e.target.classList.contains('quiz-option') && !e.target.classList.contains('correct') && !e.target.classList.contains('wrong')) {
                        const questionIndex = e.target.dataset.question;
                        if (answeredQuestions[questionIndex]) return;
                        
                        const isCorrect = e.target.dataset.correct === 'true';
                        
                        // تعطيل كل الخيارات
                        document.querySelectorAll(`[data-question="${questionIndex}"] .quiz-option`).forEach(opt => {
                            opt.style.pointerEvents = 'none';
                        });
                        
                        e.target.classList.add(isCorrect ? 'correct' : 'wrong');
                        
                        if (isCorrect) {
                            quizScore += 10;
                            document.getElementById(`feedback-${questionIndex}`).textContent = '✅ إجابة صحيحة!';
                            
                            // إظهار الإجابة الصحيحة
                            document.querySelectorAll(`[data-question="${questionIndex}"] .quiz-option[data-correct="true"]`).forEach(opt => {
                                opt.classList.add('correct');
                            });
                        } else {
                            document.getElementById(`feedback-${questionIndex}`).textContent = '❌ إجابة خاطئة';
                            
                            // إظهار الإجابة الصحيحة
                            document.querySelectorAll(`[data-question="${questionIndex}"] .quiz-option[data-correct="true"]`).forEach(opt => {
                                opt.classList.add('correct');
                            });
                        }
                        
                        answeredQuestions[questionIndex] = true;
                        updateStats();
                    }
                });

                // البحث
                document.addEventListener('input', (e) => {
                    if (e.target.id === 'searchInput') {
                        const query = e.target.value.toLowerCase();
                        document.querySelectorAll('.icon-item').forEach((item, i) => {
                            const explanation = explanations[i].toLowerCase();
                            item.style.display = (explanation.includes(query) || query === '') ? 'flex' : 'none';
                        });
                    }
                });
            }

            // ===== تحديث التقدم =====
            function updateProgress() {
                if (loadedImages >= totalImages) return;
                
                loadedImages++;
                const percent = (loadedImages / totalImages) * 100;
                
                if (loadedImages >= totalImages) {
                    statusText.textContent = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                    localStorage.setItem('images_ready', 'true');
                }
            }

            // ===== تخزين الصور في Cache =====
            async function cacheImages() {
                if ('caches' in window) {
                    try {
                        const cache = await caches.open('anatomy-v1');
                        
                        await Promise.all(
                            imageFiles.map(async (img) => {
                                const cached = await cache.match(img);
                                
                                if (cached) {
                                    updateProgress();
                                } else {
                                    try {
                                        const response = await fetch(img + '?v=1');
                                        if (response.ok) {
                                            await cache.put(img, response.clone());
                                            updateProgress();
                                        } else {
                                            loadedImages++;
                                        }
                                    } catch (err) {
                                        loadedImages++;
                                    }
                                }
                            })
                        );
                    } catch (err) {
                        console.log('Cache error:', err);
                    }
                }
            }

            // ===== التهيئة =====
            function init() {
                // تطبيق الوضع الليلي
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                    darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
                
                // زر الوضع الليلي
                darkModeToggle.addEventListener('click', () => {
                    darkMode = !darkMode;
                    document.body.classList.toggle('dark-mode', darkMode);
                    darkModeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                    updateStats();
                });

                // أحداث التبويبات العلوية
                topTabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        renderContent(tab.dataset.tab);
                    });
                });

                // أحداث الشريط السفلي
                bottomNavItems.forEach(item => {
                    item.addEventListener('click', () => {
                        renderContent(item.dataset.nav);
                    });
                });

                // دعم أزرار لوحة المفاتيح
                window.addEventListener('keydown', (e) => {
                    if (currentTab === 'images') {
                        if (e.key === 'ArrowLeft') {
                            e.preventDefault();
                            App.changeImage(currentIndex + 1);
                        } else if (e.key === 'ArrowRight') {
                            e.preventDefault();
                            App.changeImage(currentIndex - 1);
                        }
                    }
                });

                // تهيئة أحداث النقر
                setupClickHandlers();

                // بدء التحميل
                if (localStorage.getItem('images_ready') === 'true') {
                    loadedImages = totalImages;
                    statusText.textContent = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                } else {
                    cacheImages();
                }

                // عرض المحتوى الأولي
                renderContent('home');

                // حفظ الجلسة كل 5 ثواني
                setInterval(updateStats, 5000);
            }

            init();
        })();
    </script>
</body>
</html>
