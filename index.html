<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>تشريح • منصة التعلم التفاعلية</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== متغيرات الألوان ===== */
        :root {
            --primary: #16636f;
            --primary-light: #22818f;
            --primary-dark: #0e404a;
            --accent: #ffb347;
            --accent-light: #ffdb9c;
            --bg-light: #f5fafc;
            --text-dark: #1e4d58;
            --text-light: #4f7a7a;
            --card-bg: #ffffff;
            --shadow-sm: 0 4px 12px rgba(22,99,111,0.08);
            --shadow-md: 0 8px 20px rgba(22,99,111,0.12);
            --border-radius: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            touch-action: manipulation;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-light: #1a2a30;
            --text-dark: #e0f0f0;
            --text-light: #9fc5c5;
            --card-bg: #1d363b;
            background: #1a2a30;
        }

        body.dark-mode .card {
            background: #1d363b;
            border-color: #3d6f6f;
        }

        body.dark-mode .search-box {
            background: #1d3a3f;
            border-color: #3d9b9b;
        }

        /* ===== حاوية التطبيق ===== */
        .app-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
        }

        /* ===== الشريط العلوي ===== */
        .top-nav {
            background: var(--primary);
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-icon {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dark-mode-toggle {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        /* ===== منطقة المحتوى ===== */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            background: var(--bg-light);
            -webkit-overflow-scrolling: touch;
        }

        /* ===== قسم الإهداء ===== */
        .dedication-section {
            background: linear-gradient(145deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
            border: 1px solid var(--accent-light);
            box-shadow: var(--shadow-sm);
        }

        .dedication-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .dedication-name {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-light);
            margin-bottom: 5px;
        }

        .dedication-dua {
            font-size: 13px;
            line-height: 1.5;
            background: rgba(0,0,0,0.15);
            padding: 10px;
            border-radius: 15px;
        }

        .dedication-dua i {
            color: var(--accent-light);
            font-size: 12px;
            margin: 0 3px;
        }

        /* ===== بطاقة الترحيب ===== */
        .welcome-card {
            background: linear-gradient(145deg, #f0f9fc, #e6f4f7);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
            border-right: 5px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .welcome-text {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .start-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            background: rgba(255,255,255,0.7);
            display: inline-block;
            padding: 5px 25px;
            border-radius: 40px;
            margin-top: 5px;
        }

        /* ===== التبويبات ===== */
        .tabs-container {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: var(--primary);
            border: 2px solid var(--primary);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* ===== شريط البحث ===== */
        .search-box {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .search-box i {
            color: var(--primary);
            font-size: 15px;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            background: transparent;
            color: var(--text-dark);
        }

        /* ===== شبكة الصور ===== */
        .images-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .image-thumb {
            width: 85px;
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .image-thumb.active {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .thumb-img {
            width: 100%;
            height: 70px;
            background: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }

        .thumb-number {
            text-align: center;
            padding: 5px;
            font-weight: 700;
            color: var(--primary);
            background: rgba(22,99,111,0.05);
        }

        /* ===== حاوية الصورة الرئيسية ===== */
        .image-container {
            background: var(--primary-dark);
            border-radius: 25px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid var(--accent-light);
            position: relative;
            margin-bottom: 15px;
            touch-action: none;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--primary-dark);
            display: block;
            transition: transform 0.2s ease-out;
            transform-origin: center center;
            will-change: transform;
        }

        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            touch-action: none;
        }

        .zoom-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 15;
        }

        /* ===== أزرار التحكم تحت الصورة ===== */
        .image-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0 20px;
        }

        .control-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }

        .control-btn.reset {
            background: var(--accent);
            color: var(--primary-dark);
        }

        .fullscreen-btn {
            background: var(--primary-light);
        }

        /* ===== شرح الصورة ===== */
        .explanation-section {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 18px;
            margin: 15px 0;
            border: 1px solid #c0e6dd;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation-content {
            line-height: 1.8;
            font-size: 14px;
            white-space: pre-line;
        }

        .explanation-content h2 {
            font-size: 18px;
            color: var(--primary);
            margin: 15px 0 8px;
        }

        .explanation-content h3 {
            font-size: 16px;
            color: var(--primary-light);
            margin: 12px 0 6px;
        }

        .explanation-content ul {
            padding-right: 20px;
            margin: 8px 0;
        }

        .explanation-content li {
            margin: 4px 0;
        }

        /* ===== أزرار الإجراءات ===== */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            background: white;
            border: 1.5px solid var(--primary);
            padding: 10px 5px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 13px;
            transition: 0.2s;
        }

        .action-btn:active {
            background: var(--primary);
            color: white;
        }

        .action-btn.favorite-active {
            background: #ff6b6b;
            border-color: #ff3b3b;
            color: white;
        }

        /* ===== التنقل بين الصور ===== */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .nav-btn {
            flex: 1;
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .nav-btn.secondary {
            background: var(--accent);
            color: var(--primary-dark);
        }

        /* ===== بطاقة الاختبار (مودل ستايل) ===== */
        .quiz-container {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 15px;
            border: 2px solid var(--primary);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--accent-light);
        }

        .quiz-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .quiz-score {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
        }

        .quiz-question {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(22,99,111,0.05);
            border-radius: 15px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .quiz-option {
            background: #f0f7fa;
            padding: 14px 18px;
            border-radius: 18px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            font-weight: 500;
            position: relative;
        }

        .quiz-option:hover {
            border-color: var(--primary);
            background: #e1f0ec;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .quiz-option.correct::after {
            content: '✓';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 700;
        }

        .quiz-option.wrong {
            background: #ff6b6b;
            color: white;
            border-color: #d32f2f;
        }

        .quiz-option.wrong::after {
            content: '✗';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 700;
        }

        .quiz-feedback {
            margin: 15px 0 10px;
            padding: 12px;
            border-radius: 15px;
            background: #f0f7fa;
            font-size: 14px;
        }

        .quiz-explanation {
            font-size: 14px;
            color: var(--primary-dark);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #c0e6dd;
        }

        .quiz-reset {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 15px;
        }

        /* ===== بطاقة الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid #c0e6dd;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .progress-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .progress-bar {
            height: 8px;
            background: #e1f0ec;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* ===== الشريط السفلي ===== */
        .bottom-nav {
            background: var(--primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 8px;
            border-top: 2px solid var(--accent-light);
            color: white;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
            transition: 0.2s;
            color: #b0d8d8;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--accent-light);
            background: rgba(255,255,255,0.1);
        }

        /* ===== كلاس hidden ===== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط العلوي -->
        <div class="top-nav">
            <div class="nav-left">
                <i class="fas fa-bars menu-icon"></i>
                <span class="app-title">تشريح</span>
            </div>
            <div class="nav-right">
                <div class="status-badge" id="offlineStatus">
                    <i class="fas fa-cloud" id="statusIcon"></i>
                    <span id="statusText">جاهز</span>
                </div>
                <div class="dark-mode-toggle" id="darkModeToggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="tabs-container" id="topTabs">
            <div class="tab active" data-tab="home">الرئيسية</div>
            <div class="tab" data-tab="images">الصور</div>
            <div class="tab" data-tab="quizzes">اختبارات مودل</div>
            <div class="tab" data-tab="stats">إحصائيات</div>
            <div class="tab" data-tab="favorites">المفضلة</div>
        </div>

        <!-- منطقة المحتوى -->
        <div class="content-area" id="contentArea"></div>

        <!-- الشريط السفلي -->
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item" data-nav="images"><i class="fas fa-images"></i><span>الصور</span></div>
            <div class="nav-item" data-nav="quizzes"><i class="fas fa-question-circle"></i><span>اختبارات</span></div>
            <div class="nav-item" data-nav="stats"><i class="fas fa-chart-bar"></i><span>إحصائيات</span></div>
            <div class="nav-item" data-nav="favorites"><i class="fas fa-heart"></i><span>المفضلة</span></div>
        </div>
    </div>

    <script>
        (function() {
            // ===== بيانات الصور والشروحات الكاملة =====
            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            // الشروحات المفصلة الكاملة
            const explanations = [
                `# CHAPTER ONE: INTRODUCTION TO HUMAN ANATOMY AND PHYSIOLOGY
الفصل الأول: مقدمة في تشريح ووظائف الأعضاء البشري

## Anatomy | علم التشريح
Anatomy is the study of body structure. يركز هذا العلم على دراسة بنية الجسم والعلاقات بين أجزائه المختلفة.

## Physiology | علم وظائف الأعضاء
Physiology is the study of body function. يركز على دراسة كيفية عمل أجزاء الجسم.

## The study of anatomy | دراسة التشريح
• Gross anatomy (التشريح العياني): دراسة تراكيب الجسم بالعين المجردة
• Microscopic anatomy (التشريح المجهري): دراسة التراكيب الدقيقة

## TISSUE | الأنسجة
• Epithelial tissue / نسيج طلائي: يغطي أسطح الجسم
• Connective tissue / نسيج ضام: يدعم ويربط الأجزاء
• Muscle tissue / نسيج عضلي: مسؤول عن الحركة
• Nerve tissue / نسيج عصبي: ينقل الإشارات

## LEVEL OF STRUCTURAL ORGANIZATION | مستويات التنظيم
1. Chemical level: Atoms → Molecules (H₂O, CO₂)
2. Cellular level: Cells (Nucleus, Mitochondria)
3. Tissue level: Tissues
4. Organ level: Organs (Stomach, Heart)
5. System level: Systems (Respiratory System)
6. Organism level: Human body`,

                `# ANATOMICAL DIRECTIONAL TERMS | المصطلحات الاتجاهية

## Superior (cranial) | العلوي (القحفي)
Toward the head end. مثال: الرأس علوي بالنسبة للبطن

## Inferior (caudal) | السفلي (الذيلي)
Away from the head. مثال: السرة سفلية بالنسبة للذقن

## Anterior (ventral) | الأمامي (البطني)
Toward the front. مثال: عظمة القص أمامية للعمود الفقري

## Posterior (dorsal) | الخلفي (الظهري)
Toward the back. مثال: القلب خلفي لعظمة القص

## Medial | الإنسي
Toward the midline. مثال: القلب إنسي للذراع

## Lateral | الوحشي
Away from the midline. مثال: الذراعان وحشيان للصدر

## Proximal | الداني
Closer to attachment. مثال: الكوع داني للمعصم

## Distal | القاصي
Farther from attachment. مثال: الركبة قاصية للفخذ

## Superficial | السطحي
Toward the surface. مثال: الجلد سطحي للعضلات

## Deep | العميق
Away from the surface. مثال: العظام عميقة للجلد`,

                `# BODY REGIONS | مناطق الجسم

## Head | الرأس
• Cranial region (المنطقة القحفية): الجمجمة
• Facial region (المنطقة الوجهية): الوجه

## Neck | الرقبة
Cervical region (المنطقة العنقية)

## Trunk | الجذع
• Thoracic region (الصدر)

                `# LEVELS OF ORGANIZATION | مستويات التنظيم

## 1. Chemical level | المستوى الكيميائي
Atoms combine to form molecules. تتحد الذرات لتكوين الجزيئات.
مثال: H₂O, CO₂, O₂, Glucose

## 2. Cellular level | المستوى الخلوي
Cells are the basic unit of life. الخلايا هي الوحدة الأساسية للحياة.
• Nucleus (نواة): تحتوي على DNA
• Mitochondria (ميتوكوندريا): تنتج الطاقة
• Cell membrane (غشاء خلوي): يتحكم بالدخول والخروج

## 3. Tissue level | المستوى النسيجي
Groups of similar cells. مجموعات من الخلايا المتشابهة.
• Epithelial tissue (طلائي)
• Connective tissue (ضام)
• Muscle tissue (عضلي)
• Nervous tissue (عصبي)

## 4. Organ level | المستوى العضوي
Different tissues work together. أنسجة مختلفة تعمل معاً.
مثال: Heart (قلب), Liver (كبد), Stomach (معدة)

## 5. System level | مستوى الجهاز
Organs work together. أعضاء تعمل معاً.
مثال: Cardiovascular system (جهاز دوري), Respiratory system (جهاز تنفسي)

## 6. Organism level | مستوى الكائن الحي
All systems working together. جميع الأجهزة تعمل معاً.`,

## Ventral Cavity | التجويف البطني

## Table Summary | جدول ملخص

                `# NEGATIVE FEEDBACK | التغذية الراجعة السلبية

## Definition | تعريف
A mechanism that reverses a change in the body. آلية تعكس التغيير في الجسم

## Blood Glucose Regulation | تنظيم سكر الدم

High glucose (ارتفاع السكر):
• Beta cells release insulin (خلايا بيتا تفرز أنسولين)
• Cells take up glucose (الخلايا تمتص السكر)
• Liver stores glycogen (الكبد يخزن جليكوجين)
• Glucose decreases (ينخفض السكر)

Low glucose (انخفاض السكر):
• Alpha cells release glucagon (خلايا ألفا تفرز جلوكاجون)
• Liver breaks down glycogen (الكبد يكسر الجليكوجين)
• Glucose increases (يرتفع السكر)

## Body Temperature Regulation | تنظيم درجة الحرارة

High temperature (ارتفاع الحرارة):
• Sweating (تعرق)
• Blood vessels dilate (توسع أوعية)
• Heat loss (فقدان حرارة)
• Temperature decreases (تنخفض الحرارة)

Low temperature (انخفاض الحرارة):
• Shivering (ارتجاف)
• Blood vessels constrict (تضيق أوعية)
• Heat production (إنتاج حرارة)
• Temperature increases (ترتفع الحرارة)`,

                `# POSITIVE FEEDBACK | التغذية الراجعة الإيجابية

## Definition | تعريف
A mechanism that amplifies a change in the body. آلية تضخم التغيير في الجسم

## Childbirth Example | مثال الولادة
1. Baby's head pushes against cervix
   (رأس الجنين يضغط على عنق الرحم)
2. Nerve impulses sent to brain
   (نبضات عصبية ترسل للدماغ)
3. Brain stimulates pituitary to release oxytocin
   (الدماغ يحفز الغدة النخامية لإفراز الأوكسيتوسين)
4. Oxytocin stimulates uterine contractions
   (الأوكسيتوسين يحفز انقباضات الرحم)
5. Baby pushed further against cervix
   (يدفع الجنين بقوة أكبر)
6. Cycle continues until birth
   (تستمر الدورة حتى الولادة)

## Other Examples | أمثلة أخرى
• Blood clotting (تجلط الدم)
• Fever (الحمى)
• Labor contractions (انقباضات الولادة)

## Comparison | مقارنة
Negative feedback: reverses change → stability (استقرار)
Positive feedback: amplifies change → completion (إتمام)`

                        <div class="welcome-card" style="text-align: center;">
                            <div class="welcome-text">✨ لا توجد صور</div>
                            <div class="start-text">أضف صوراً للمفضلة</div>
                        </div>
                    `;
                }

                return `
                    <div class="images-grid">
                        ${favorites.map(index => `
                            <div class="image-thumb favorite active" onclick="App.changeImage(${index})">
                                <div class="thumb-img">🫀</div>
                                <div class="thumb-number">صورة ${index + 1}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // ===== تهيئة عناصر الصورة =====
            function initImageElements() {
                const touchOverlay = document.getElementById('touchOverlay');
                if (!touchOverlay) return;

                const touchStart = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && scale > 1) {
                        isPanning = true;
                        lastPanX = touches[0].clientX - panX;
                        lastPanY = touches[0].clientY - panY;
                    } else if (touches.length === 1) {
                        startX = touches[0].clientX;
                    }
                    
                    if (touches.length === 2) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        initialDistance = Math.sqrt(dx * dx + dy * dy);
                    }
                };

                const touchMove = (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    
                    if (touches.length === 1 && isPanning && scale > 1) {
                        panX = touches[0].clientX - lastPanX;
                        panY = touches[0].clientY - lastPanY;
                        
                        const maxPan = 100 * (scale - 1);
                        panX = Math.min(maxPan, Math.max(-maxPan, panX));
                        panY = Math.min(maxPan, Math.max(-maxPan, panY));
                        
                        updateImageTransform();
                    } else if (touches.length === 2 && initialDistance > 0) {
                        const dx = touches[0].clientX - touches[1].clientX;
                        const dy = touches[0].clientY - touches[1].clientY;
                        const currentDistance = Math.sqrt(dx * dx + dy * dy);
                        const newScale = scale * (currentDistance / initialDistance);
                        scale = Math.min(maxScale, Math.max(minScale, newScale));
                        updateImageTransform();
                        initialDistance = currentDistance;
                    }
                };

                const touchEnd = (e) => {
                    const touches = e.touches;
                    
                    if (touches.length === 0) {
                        if (isPanning) {
                            isPanning = false;
                        } else {
                            const endX = e.changedTouches[0].clientX;
                            const diff = endX - startX;
                            
                            if (Math.abs(diff) > 60 && scale === 1) {
                                if (diff > 0 && currentIndex > 0) {
                                    App.changeImage(currentIndex - 1);
                                } else if (diff < 0 && currentIndex < imageFiles.length - 1) {
                                    App.changeImage(currentIndex + 1);
                                }
                            }
                        }
                    }
                    
                    if (touches.length < 2) initialDistance = 0;
                    
                    const currentTime = new Date().getTime();
                    if (currentTime - lastTap < 300) {
                        if (scale > 1.5) {
                            scale = 1;
                            panX = 0;
                            panY = 0;
                        } else {
                            scale = 2.5;
                        }
                        updateImageTransform();
                    }
                    lastTap = currentTime;
                };

                touchOverlay.addEventListener('touchstart', touchStart, { passive: false });
                touchOverlay.addEventListener('touchmove', touchMove, { passive: false });
                touchOverlay.addEventListener('touchend', touchEnd);
                touchOverlay.addEventListener('touchcancel', touchEnd);
            }

            function updateImageTransform() {
                const img = document.getElementById('mainImage');
                if (img) {
                    img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                }
                const zoomLevel = document.getElementById('zoomLevel');
                if (zoomLevel) zoomLevel.textContent = scale.toFixed(1) + 'x';
            }

            // ===== أحداث النقر =====
            function setupClickHandlers() {
                document.addEventListener('click', (e) => {
                    if (e.target.closest('#zoomIn')) {
                        scale = Math.min(maxScale, scale + 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomOut')) {
                        scale = Math.max(minScale, scale - 0.3);
                        updateImageTransform();
                    } else if (e.target.closest('#zoomReset')) {
                        scale = 1;
                        panX = 0;
                        panY = 0;
                        updateImageTransform();
                    } else if (e.target.closest('#fullscreenBtn')) {
                        const container = document.getElementById('imageContainer');
                        if (container.requestFullscreen) {
                            container.requestFullscreen();
                        }
                    } else if (e.target.closest('#favoriteBtn')) {
                        const btn = e.target.closest('#favoriteBtn');
                        const index = favorites.indexOf(currentIndex);
                        if (index === -1) {
                            favorites.push(currentIndex);
                            btn.classList.add('favorite-active');
                        } else {
                            favorites.splice(index, 1);
                            btn.classList.remove('favorite-active');
                        }
                        updateStats();
                    } else if (e.target.closest('#downloadBtn')) {
                        const link = document.createElement('a');
                        link.href = imageFiles[currentIndex];
                        link.download = imageFiles[currentIndex];
                        link.click();
                    } else if (e.target.closest('#speakBtn')) {
                        const text = explanations[currentIndex].substring(0, 200);
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'ar-SA';
                        window.speechSynthesis.speak(utterance);
                    }
                });

                document.addEventListener('input', (e) => {
                    if (e.target.id === 'searchInput') {
                        const query = e.target.value.toLowerCase();
                        document.querySelectorAll('.image-thumb').forEach((thumb, i) => {
                            const explanation = explanations[i].toLowerCase();
                            thumb.style.display = (explanation.includes(query) || query === '') ? 'block' : 'none';
                        });
                    }
                });
            }

            // ===== تحديث التقدم =====
            function updateProgress() {
                if (loadedImages >= totalImages) return;
                loadedImages++;
                
                if (loadedImages >= totalImages) {
                    statusText.textContent = 'متاح بدون إنترنت';
                    localStorage.setItem('images_ready', 'true');
                }
            }

            async function cacheImages() {
                if ('caches' in window) {
                    try {
                        const cache = await caches.open('anatomy-v1');
                        await Promise.all(imageFiles.map(async (img) => {
                            const cached = await cache.match(img);
                            if (cached) updateProgress();
                            else {
                                try {
                                    const response = await fetch(img + '?v=1');
                                    if (response.ok) {
                                        await cache.put(img, response.clone());
                                        updateProgress();
                                    }
                                } catch (err) {
                                    updateProgress();
                                }
                            }
                        }));
                    } catch (err) {}
                }
            }

            // ===== التهيئة =====
            function init() {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                    darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
                
                darkModeToggle.addEventListener('click', () => {
                    darkMode = !darkMode;
                    document.body.classList.toggle('dark-mode', darkMode);
                    darkModeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                    updateStats();
                });

                topTabs.forEach(tab => {
                    tab.addEventListener('click', () => renderContent(tab.dataset.tab));
                });

                bottomNavItems.forEach(item => {
                    item.addEventListener('click', () => renderContent(item.dataset.nav));
                });

                setupClickHandlers();

                if (localStorage.getItem('images_ready') === 'true') {
                    loadedImages = totalImages;
                    statusText.textContent = 'متاح بدون إنترنت';
                } else {
                    cacheImages();
                }

                renderContent('home');

                setInterval(updateStats, 5000);
            }

            init();
        })();
    </script>
</body>
</html>
