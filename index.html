<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تشريح • الأطلس الذكي للطلاب</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* منع تكبير الصفحة باللمس */
        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* الوضع الليلي */
        body.dark-mode {
            background: #1a2a30;
            color: #e0f0f0;
        }

        body.dark-mode .header {
            background: #0e3f48;
        }

        body.dark-mode .main-panel {
            background: #243b40;
            border-color: #3d6369;
        }

        body.dark-mode .info-box {
            background: #1f3a3f;
            border-color: #3d6b6b;
        }

        body.dark-mode .notes-content {
            background: #1d363b;
            color: #d0ece5;
            border-color: #3d6f6f;
        }

        body.dark-mode .icon-item {
            background: #1d3a3f;
        }

        body.dark-mode .icon-item i {
            color: #b0e0d0;
        }

        body.dark-mode .progress-mini {
            background: #1d3a3f;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f7fa;
            color: #1a4f58;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== شريط الأدوات العلوي ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: space-between;
        }

        .tool-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: white;
            border: 1.5px solid #16636f;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #16636f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .tool-btn:hover {
            background: #16636f;
            color: white;
        }

        .tool-btn i {
            font-size: 14px;
        }

        body.dark-mode .tool-btn {
            background: #1d3a3f;
            color: #b0e0d0;
            border-color: #3d9b9b;
        }

        /* ===== الهيدر ===== */
        .header {
            background: #16636f;
            color: white;
            border-radius: 45px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 8px 18px rgba(0,55,65,0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: #ffdb9c;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .offline-badge {
            background: #22818f;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: 1px solid #9de0d8;
        }

        /* ===== شريط البحث ===== */
        .search-box {
            background: white;
            border-radius: 40px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border: 2px solid #16636f;
        }

        .search-box i {
            color: #16636f;
            font-size: 18px;
        }

        #searchInput {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 0;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            background: transparent;
        }

        body.dark-mode .search-box {
            background: #1d3a3f;
            border-color: #3d9b9b;
        }

        body.dark-mode #searchInput {
            color: #e0f0f0;
        }

        body.dark-mode #searchInput::placeholder {
            color: #8bb5b5;
        }

        /* ===== شريط التقدم ===== */
        .progress-mini {
            background: white;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.02);
            border: 1px solid #d4ece5;
        }

        .progress-icon {
            background: #16636f;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffdb9c;
        }

        .progress-bar-small {
            flex: 1;
            height: 8px;
            background: #e1f0ec;
            border-radius: 20px;
            overflow: hidden;
            min-width: 140px;
        }

        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, #16636f, #3fa6b2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .progress-stats {
            font-size: 14px;
            font-weight: 600;
            color: #16636f;
        }

        /* ===== شبكة الأيقونات ===== */
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .icon-item {
            width: 60px;
            height: 65px;
            background: white;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: all 0.2s;
            touch-action: manipulation;
            position: relative;
        }

        .icon-item.favorite::after {
            content: '❤️';
            position: absolute;
            top: -5px;
            left: -5px;
            font-size: 12px;
        }

        .icon-item.active {
            border-color: #16636f;
            background: #e1f6f2;
            transform: scale(0.98);
        }

        .icon-item i {
            font-size: 22px;
            color: #16636f;
        }

        .icon-item span {
            font-size: 12px;
            font-weight: 700;
            color: #1a5f6b;
            background: #edf9f5;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* ===== اللوحة الرئيسية ===== */
        .main-panel {
            background: white;
            border-radius: 40px;
            padding: 18px;
            box-shadow: 0 15px 30px rgba(0,50,60,0.05);
            border: 1px solid #ccebe4;
        }

        .display-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 18px;
        }

        /* ===== حاوية الصورة ===== */
        .image-box {
            background: #12363d;
            border-radius: 35px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid #c6ece3;
            position: relative;
            touch-action: none;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #12363d;
            display: block;
            transition: transform 0.2s ease-out;
            transform-origin: center center;
        }

        /* مؤشر تحميل الصورة */
        #imageLoader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 15;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            touch-action: none;
        }

        /* أزرار التحكم */
        .zoom-controls {
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid #80d6cc;
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .zoom-btn:active {
            background: #16636f;
        }

        .zoom-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 15;
        }

        /* ===== بطاقة المعلومات ===== */
        .info-box {
            background: #f6fdfb;
            border-radius: 35px;
            padding: 18px;
            border: 1px solid #ccebe4;
            transition: all 0.3s;
        }

        .info-box.study-mode .notes-content {
            opacity: 0.5;
            filter: blur(4px);
            pointer-events: none;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-header h3 {
            font-size: 18px;
            color: #16636f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge {
            background: #16636f;
            color: white;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
        }

        .notes-content {
            background: white;
            border-radius: 30px;
            padding: 18px;
            max-height: 240px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid #c0e6dd;
            white-space: pre-line;
            scrollbar-width: thin;
            transition: all 0.3s;
        }

        /* ===== أزرار الإجراءات ===== */
        .action-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-sm {
            flex: 1;
            min-width: 70px;
            background: white;
            border: 1.5px solid #16636f;
            padding: 8px 4px;
            border-radius: 40px;
            font-weight: 600;
            color: #16636f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 12px;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .action-sm:hover {
            background: #16636f;
            color: white;
        }

        .action-sm.favorite-active {
            background: #ff6b6b;
            border-color: #ff3b3b;
            color: white;
        }

        /* ===== رسائل الخطأ ===== */
        .error-message {
            background: #ffede5;
            border: 1.5px solid #c95a5a;
            color: #a13b3b;
            padding: 12px 20px;
            border-radius: 45px;
            margin: 15px 0 0;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        /* ===== اختبار سريع ===== */
        .quiz-card {
            background: white;
            border-radius: 30px;
            padding: 18px;
            margin: 15px 0;
            border: 2px solid #16636f;
        }

        .quiz-question {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .quiz-option {
            background: #f0f7fa;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .quiz-option:hover {
            border-color: #16636f;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: white;
        }

        .quiz-option.wrong {
            background: #ff6b6b;
            color: white;
        }

        .quiz-feedback {
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            padding: 8px;
            border-radius: 30px;
            background: #e8f3f0;
        }

        /* ===== تذييل ===== */
        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #588e94;
            padding: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
            font-size: 12px;
        }

        /* ===== تحسينات الجوال ===== */
        @media (max-width: 800px) {
            .display-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .icon-item {
                width: 52px;
                height: 58px;
            }
            .icon-item i {
                font-size: 20px;
            }
            .toolbar {
                flex-direction: column;
            }
            .tool-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شريط الأدوات العلوي -->
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" id="darkModeBtn"><i class="fas fa-moon"></i> ليلي</button>
                <button class="tool-btn" id="studyModeBtn"><i class="fas fa-graduation-cap"></i> دراسة</button>
                <button class="tool-btn" id="quizBtn"><i class="fas fa-question-circle"></i> اختبار</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="favoritesBtn"><i class="fas fa-heart"></i> المفضلة</button>
                <button class="tool-btn" id="statsBtn"><i class="fas fa-chart-bar"></i> إحصائيات</button>
            </div>
        </div>

        <!-- الهيدر -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <div>
                    <h1>أطلس التشريح الذكي</h1>
                    <p><i class="fas fa-user-graduate"></i> <span id="sessionDisplay">جلسة جديدة</span></p>
                </div>
            </div>
            <div class="offline-badge" id="offlineStatus">
                <i class="fas fa-cloud" id="statusIcon"></i>
                <span id="statusText">يتم التحميل...</span>
            </div>
        </div>

        <!-- شريط البحث -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث في الشرح... مثل: abdomen, heart, tissue">
        </div>

        <!-- شريط التقدم -->
        <div class="progress-mini">
            <div class="progress-icon">
                <i class="fas fa-database"></i>
            </div>
            <div class="progress-bar-small">
                <div class="progress-fill-small" id="progressFill"></div>
            </div>
            <div class="progress-stats">
                <span id="loadedCount">0</span>/<span id="totalCount">9</span>
            </div>
        </div>

        <!-- شبكة الأيقونات -->
        <div class="icon-grid" id="iconGrid"></div>

        <!-- العرض الرئيسي -->
        <div class="main-panel">
            <div class="display-grid">
                <!-- الصورة -->
                <div class="image-box" id="imageContainer">
                    <img id="mainImage" src="" alt="صورة تشريحية" loading="lazy">
                    <div id="imageLoader">🔄 تحميل الصورة...</div>
                    <div class="touch-overlay" id="touchOverlay"></div>
                    
                    <div class="zoom-indicator" id="zoomIndicator">
                        <i class="fas fa-search"></i> <span id="zoomLevel">1.0x</span>
                    </div>

                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
                        <button class="zoom-btn" id="zoomReset"><i class="fas fa-undo-alt"></i></button>
                        <button class="zoom-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
                        <button class="zoom-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>

                <!-- المعلومات -->
                <div class="info-box" id="infoBox">
                    <div class="info-header">
                        <h3><i class="fas fa-pen"></i> شرح الصورة</h3>
                        <div style="display: flex; gap: 5px;">
                            <button class="tool-btn" style="padding: 3px 10px;" id="speakBtn"><i class="fas fa-volume-up"></i></button>
                            <span class="file-badge" id="filename">1.jpg</span>
                        </div>
                    </div>
                    <div class="notes-content" id="notesContent">
                        جاري التحميل...
                    </div>

                    <div class="action-group">
                        <button class="action-sm" id="downloadImg"><i class="fas fa-download"></i> صورة</button>
                        <button class="action-sm" id="downloadTxt"><i class="fas fa-file-alt"></i> نص</button>
                        <button class="action-sm" id="copyLink"><i class="fas fa-link"></i> رابط</button>
                        <button class="action-sm" id="shareBtn"><i class="fas fa-share-alt"></i> مشاركة</button>
                        <button class="action-sm" id="favoriteBtn"><i class="fas fa-heart"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- منطقة الاختبار (تظهر عند الضغط) -->
        <div id="quizArea" style="display: none;"></div>

        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <!-- تذييل مع إحصائيات -->
        <div class="footer" id="footer">
            <i class="fas fa-check-circle" style="color: #16636f;"></i>
            <span>يعمل بدون إنترنت بعد التحميل</span>
            <div class="stats-row" id="statsRow">
                <span><i class="fas fa-heart"></i> <span id="favoriteCount">0</span></span>
                <span><i class="fas fa-check"></i> <span id="studiedCount">0</span>/9</span>
                <span><i class="fas fa-star"></i> <span id="quizScore">0%</span></span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- إدارة الجلسة (Session Management) ----------
            function getSessionId() {
                let sessionId = localStorage.getItem('user_session');
                if (!sessionId) {
                    sessionId = 'sess-' + Date.now() + '-' + Math.random().toString(36).substring(2, 10);
                    localStorage.setItem('user_session', sessionId);
                }
                return sessionId;
            }

            const SESSION_ID = getSessionId();
            document.getElementById('sessionDisplay').textContent = 'معرف: ' + SESSION_ID.substring(0, 8) + '...';

            // حفظ واسترجاع بيانات الجلسة
            function saveSessionData(data) {
                localStorage.setItem('session_data_' + SESSION_ID, JSON.stringify(data));
            }

            function loadSessionData() {
                const data = localStorage.getItem('session_data_' + SESSION_ID);
                return data ? JSON.parse(data) : null;
            }

            // ---------- البيانات ----------
            const notesData = [
                `# CHAPTER ONE: INTRODUCTION

## Anatomy | علم التشريح
Study of body structure

## Physiology | علم وظائف الأعضاء
Study of body function

### Tissues | الأنسجة
• Epithelial / طلائي
• Connective / ضام
• Muscle / عضلي
• Nerve / عصبي`,

                `# DIRECTIONAL TERMS

Superior (علوي) : above
Inferior (سفلي) : below
Anterior (أمامي) : front
Posterior (خلفي) : back
Medial (إنسي) : toward midline
Lateral (وحشي) : away from midline
Proximal (دان) : closer
Distal (قاصي) : farther`,

                `# BODY REGIONS

Head / الرأس
Neck / الرقبة
Thorax / الصدر
Abdomen / البطن
Pelvis / الحوض
Upper limb / الطرف العلوي
Lower limb / الطرف السفلي`,

                `# LEVELS OF ORGANIZATION

1. Chemical (كيميائي)
2. Cellular (خلوي)
3. Tissue (نسيجي)
4. Organ (عضو)
5. System (جهاز)
6. Organism (كائن حي)`,

                `# ABDOMINAL REGIONS

9 Regions:
- Hypochondriac (يمين/يسار)
- Lumbar (يمين/يسار)
- Iliac (يمين/يسار)
- Epigastric
- Umbilical
- Hypogastric`,

                `# BODY CAVITIES

Dorsal / خلفي:
- Cranial (دماغ)
- Vertebral (نخاع شوكي)

Ventral / أمامي:
- Thoracic (قلب, رئتين)
- Abdominal (جهاز هضمي)
- Pelvic (مثانة, تناسلي)`,

                `# HOMEOSTASIS

الاتزان الداخلي

Components:
• Receptor / مستقبل
• Control center / مركز تحكم
• Effector / منفذ

Negative feedback / تغذية راجعة سلبية
Positive feedback / تغذية راجعة إيجابية`,

                `# NEGATIVE FEEDBACK

Blood Glucose:
High → Insulin → Glucose down
Low → Glucagon → Glucose up

Body Temperature:
Hot → Sweating → Cooling
Cold → Shivering → Warming`,

                `# ANATOMICAL POSITION

الوضع التشريحي:
• Standing upright
• Face forward
• Palms forward
• Feet together`
            ];

            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            // ---------- متغيرات الحالة ----------
            let currentIndex = 0;
            let scale = 1;
            let panX = 0;
            let panY = 0;
            let isPanning = false;
            let lastPanX = 0;
            let lastPanY = 0;
            const minScale = 0.8;
            const maxScale = 4;
            let initialDistance = 0;
            let lastTap = 0;
            let startX = 0;
            let loadedImages = 0;
            const totalImages = imageFiles.length;

            // بيانات المستخدم
            let favorites = [];
            let studiedImages = new Array(imageFiles.length).fill(false);
            let quizScore = 0;
            let studyMode = false;
            let darkMode = false;

            // عناصر DOM
            const iconGrid = document.getElementById('iconGrid');
            const mainImage = document.getElementById('mainImage');
            const filename = document.getElementById('filename');
            const notes = document.getElementById('notesContent');
            const touchOverlay = document.getElementById('touchOverlay');
            const zoomLevel = document.getElementById('zoomLevel');
            const progressFill = document.getElementById('progressFill');
            const loadedCount = document.getElementById('loadedCount');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const imageLoader = document.getElementById('imageLoader');
            const infoBox = document.getElementById('infoBox');
            const searchInput = document.getElementById('searchInput');
            const favoriteCount = document.getElementById('favoriteCount');
            const studiedCount = document.getElementById('studiedCount');
            const quizScoreSpan = document.getElementById('quizScore');
            const quizArea = document.getElementById('quizArea');

            // تحميل بيانات الجلسة
            const sessionData = loadSessionData();
            if (sessionData) {
                if (sessionData.favorites) favorites = sessionData.favorites;
                if (sessionData.studiedImages) studiedImages = sessionData.studiedImages;
                if (sessionData.quizScore) quizScore = sessionData.quizScore;
                if (sessionData.darkMode) {
                    darkMode = sessionData.darkMode;
                    document.body.classList.toggle('dark-mode', darkMode);
                }
            }

            // ---------- تحديث الإحصائيات ----------
            function updateStats() {
                favoriteCount.textContent = favorites.length;
                const studied = studiedImages.filter(v => v).length;
                studiedCount.textContent = studied;
                const scorePercent = Math.round((quizScore / (imageFiles.length * 10)) * 100) || 0;
                quizScoreSpan.textContent = scorePercent + '%';
                
                saveSessionData({
                    favorites,
                    studiedImages,
                    quizScore,
                    darkMode,
                    lastImage: currentIndex,
                    zoom: scale
                });
            }

            // ---------- بناء الأيقونات ----------
            function buildIcons() {
                iconGrid.innerHTML = '';
                for (let i = 0; i < imageFiles.length; i++) {
                    const btn = document.createElement('div');
                    btn.className = `icon-item ${i === 0 ? 'active' : ''} ${favorites.includes(i) ? 'favorite' : ''}`;
                    btn.setAttribute('data-index', i);
                    btn.innerHTML = `
                        <i class="fas fa-image"></i>
                        <span>${i + 1}</span>
                    `;
                    btn.onclick = () => changeImage(i);
                    iconGrid.appendChild(btn);
                }
            }

            // ---------- تغيير الصورة ----------
            function changeImage(index) {
                if (index < 0 || index >= imageFiles.length) return;
                
                currentIndex = index;
                imageLoader.style.display = 'block';
                mainImage.src = imageFiles[index];
                filename.innerText = imageFiles[index];
                notes.innerText = notesData[index];
                
                // تحديث الأيقونات
                document.querySelectorAll('.icon-item').forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                
                // تحديث زر المفضلة
                updateFavoriteButton();
                
                // تسجيل أن الصورة تمت دراستها
                studiedImages[index] = true;
                updateStats();
                
                scale = 1;
                panX = 0;
                panY = 0;
                updateZoom();
                window.location.hash = `img-${index + 1}`;
            }

            // ---------- تحديث التكبير ----------
            function updateZoom() {
                mainImage.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                zoomLevel.innerText = scale.toFixed(1) + 'x';
            }

            // ---------- البحث في الشروح ----------
            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                
                document.querySelectorAll('.icon-item').forEach((item, i) => {
                    const note = notesData[i].toLowerCase();
                    if (note.includes(query) || query === '') {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });

            // ---------- المفضلة ----------
            function toggleFavorite() {
                const index = favorites.indexOf(currentIndex);
                if (index === -1) {
                    favorites.push(currentIndex);
                } else {
                    favorites.splice(index, 1);
                }
                
                document.querySelectorAll('.icon-item').forEach((btn, i) => {
                    if (favorites.includes(i)) {
                        btn.classList.add('favorite');
                    } else {
                        btn.classList.remove('favorite');
                    }
                });
                
                updateFavoriteButton();
                updateStats();
            }

            function updateFavoriteButton() {
                const favBtn = document.getElementById('favoriteBtn');
                if (favorites.includes(currentIndex)) {
                    favBtn.classList.add('favorite-active');
                } else {
                    favBtn.classList.remove('favorite-active');
                }
            }

            document.getElementById('favoriteBtn').onclick = toggleFavorite;

            // ---------- وضع الدراسة ----------
            document.getElementById('studyModeBtn').onclick = () => {
                studyMode = !studyMode;
                infoBox.classList.toggle('study-mode', studyMode);
                document.getElementById('studyModeBtn').style.background = studyMode ? '#16636f' : '';
                document.getElementById('studyModeBtn').style.color = studyMode ? 'white' : '';
            };

            // ---------- الوضع الليلي ----------
            document.getElementById('darkModeBtn').onclick = () => {
                darkMode = !darkMode;
                document.body.classList.toggle('dark-mode', darkMode);
                saveSessionData({ ...loadSessionData(), darkMode });
            };

            // ---------- نطق المصطلحات ----------
            document.getElementById('speakBtn').onclick = () => {
                const text = notesData[currentIndex];
                const utterance = new SpeechSynthesisUtterance(text.substring(0, 200));
                utterance.lang = 'ar-SA';
                window.speechSynthesis.speak(utterance);
            };

            // ---------- اختبار سريع ----------
            function generateQuiz() {
                const questions = [
                    {
                        q: "What does 'Medial' mean?",
                        options: ['Toward midline', 'Away from midline', 'Above', 'Below'],
                        correct: 0
                    },
                    {
                        q: "Which cavity contains the heart?",
                        options: ['Cranial', 'Thoracic', 'Abdominal', 'Pelvic'],
                        correct: 1
                    },
                    {
                        q: "What is the study of tissues called?",
                        options: ['Anatomy', 'Physiology', 'Histology', 'Cytology'],
                        correct: 2
                    }
                ];
                
                const randomQ = questions[Math.floor(Math.random() * questions.length)];
                
                let html = `
                    <div class="quiz-card">
                        <div class="quiz-question">${randomQ.q}</div>
                        <div class="quiz-options">
                `;
                
                randomQ.options.forEach((opt, i) => {
                    html += `<div class="quiz-option" data-correct="${i === randomQ.correct}">${opt}</div>`;
                });
                
                html += `
                        </div>
                        <div class="quiz-feedback" id="quizFeedback"></div>
                    </div>
                `;
                
                quizArea.innerHTML = html;
                quizArea.style.display = 'block';
                
                document.querySelectorAll('.quiz-option').forEach(opt => {
                    opt.onclick = function() {
                        const isCorrect = this.dataset.correct === 'true';
                        this.classList.add(isCorrect ? 'correct' : 'wrong');
                        
                        if (isCorrect) {
                            quizScore += 10;
                            document.getElementById('quizFeedback').textContent = '✅ إجابة صحيحة!';
                        } else {
                            document.getElementById('quizFeedback').textContent = '❌ إجابة خاطئة - حاول مرة أخرى';
                        }
                        
                        updateStats();
                    };
                });
            }

            document.getElementById('quizBtn').onclick = generateQuiz;
            document.getElementById('favoritesBtn').onclick = () => {
                searchInput.value = '';
                document.querySelectorAll('.icon-item').forEach((item, i) => {
                    item.style.display = favorites.includes(i) ? 'flex' : 'none';
                });
            };

            document.getElementById('statsBtn').onclick = updateStats;

            // ---------- نظام اللمس المتطور مع Pan ----------
            touchOverlay.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touches = e.touches;
                
                if (touches.length === 1 && scale > 1) {
                    isPanning = true;
                    lastPanX = touches[0].clientX - panX;
                    lastPanY = touches[0].clientY - panY;
                } else if (touches.length === 1) {
                    startX = touches[0].clientX;
                }
                
                if (touches.length === 2) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    initialDistance = Math.sqrt(dx * dx + dy * dy);
                }
            });

            touchOverlay.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touches = e.touches;
                
                if (touches.length === 1 && isPanning && scale > 1) {
                    panX = touches[0].clientX - lastPanX;
                    panY = touches[0].clientY - lastPanY;
                    
                    // حدود الصورة
                    const maxPan = 100 * (scale - 1);
                    panX = Math.min(maxPan, Math.max(-maxPan, panX));
                    panY = Math.min(maxPan, Math.max(-maxPan, panY));
                    
                    updateZoom();
                } else if (touches.length === 2 && initialDistance > 0) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    const currentDistance = Math.sqrt(dx * dx + dy * dy);
                    const newScale = scale * (currentDistance / initialDistance);
                    scale = Math.min(maxScale, Math.max(minScale, newScale));
                    updateZoom();
                    initialDistance = currentDistance;
                }
            });

            touchOverlay.addEventListener('touchend', (e) => {
                const touches = e.touches;
                
                if (touches.length === 0) {
                    if (isPanning) {
                        isPanning = false;
                    } else {
                        const endX = e.changedTouches[0].clientX;
                        const diff = endX - startX;
                        
                        if (Math.abs(diff) > 80 && scale === 1) {
                            if (diff > 0 && currentIndex > 0) {
                                changeImage(currentIndex - 1);
                            } else if (diff < 0 && currentIndex < imageFiles.length - 1) {
                                changeImage(currentIndex + 1);
                            }
                        }
                    }
                }
                
                if (touches.length < 2) initialDistance = 0;
                
                const currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    if (scale > 1.5) {
                        scale = 1;
                        panX = 0;
                        panY = 0;
                    } else {
                        scale = 2.5;
                    }
                    updateZoom();
                }
                lastTap = currentTime;
            });

            touchOverlay.addEventListener('contextmenu', (e) => e.preventDefault());

            // ---------- أزرار التحكم ----------
            document.getElementById('zoomIn').onclick = () => {
                scale = Math.min(maxScale, scale + 0.3);
                updateZoom();
            };

            document.getElementById('zoomOut').onclick = () => {
                scale = Math.max(minScale, scale - 0.3);
                updateZoom();
            };

            document.getElementById('zoomReset').onclick = () => {
                scale = 1;
                panX = 0;
                panY = 0;
                updateZoom();
            };

            document.getElementById('fullscreenBtn').onclick = () => {
                const container = document.getElementById('imageContainer');
                if (container.requestFullscreen) container.requestFullscreen();
            };

            // ---------- أزرار الإجراءات ----------
            document.getElementById('downloadImg').onclick = () => {
                const link = document.createElement('a');
                link.href = imageFiles[currentIndex];
                link.download = imageFiles[currentIndex];
                link.click();
            };

            document.getElementById('downloadTxt').onclick = () => {
                const text = notesData[currentIndex];
                const blob = new Blob([text], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `notes_${currentIndex + 1}.txt`;
                link.click();
            };

            document.getElementById('copyLink').onclick = () => {
                const url = window.location.href.split('#')[0] + `#img-${currentIndex + 1}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert('✅ تم نسخ الرابط');
                });
            };

            document.getElementById('shareBtn').onclick = () => {
                if (navigator.share) {
                    navigator.share({
                        title: 'أطلس التشريح',
                        text: notesData[currentIndex].substring(0, 100) + '...',
                        url: window.location.href
                    });
                } else {
                    alert('يمكنك نسخ الرابط للمشاركة');
                }
            };

            // ---------- دعم لوحة المفاتيح ----------
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    changeImage(currentIndex + 1);
                }
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    changeImage(currentIndex - 1);
                }
                if (e.key === '+' || e.key === '=') {
                    e.preventDefault();
                    scale = Math.min(maxScale, scale + 0.3);
                    updateZoom();
                }
                if (e.key === '-' || e.key === '_') {
                    e.preventDefault();
                    scale = Math.max(minScale, scale - 0.3);
                    updateZoom();
                }
                if (e.key === '0') {
                    e.preventDefault();
                    scale = 1;
                    panX = 0;
                    panY = 0;
                    updateZoom();
                }
                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFavorite();
                }
                if (e.key === 's' || e.key === 'S') {
                    e.preventDefault();
                    document.getElementById('studyModeBtn').click();
                }
            });

            // ---------- تحديث التقدم ----------
            function updateProgress() {
                loadedImages++;
                const percent = (loadedImages / totalImages) * 100;
                progressFill.style.width = percent + '%';
                loadedCount.innerText = loadedImages;
                
                if (loadedImages >= totalImages) {
                    statusText.innerText = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                    localStorage.setItem('images_ready', 'true');
                }
            }

            // ---------- تخزين الصور في Cache ----------
            async function cacheImages() {
                if ('caches' in window) {
                    try {
                        const cache = await caches.open('anatomy-v1');
                        
                        await Promise.all(
                            imageFiles.map(async (img) => {
                                const cached = await cache.match(img);
                                
                                if (cached) {
                                    updateProgress();
                                } else {
                                    try {
                                        const response = await fetch(img);
                                        if (response.ok) {
                                            await cache.put(img, response.clone());
                                            updateProgress();
                                        }
                                    } catch (err) {
                                        loadedImages++;
                                        updateProgress();
                                    }
                                }
                            })
                        );
                    } catch (err) {
                        console.log('Cache error:', err);
                    }
                }
            }

            // ---------- معالجة الصورة ----------
            mainImage.onload = function() {
                imageLoader.style.display = 'none';
                errorMsg.style.display = 'none';
            };

            mainImage.onerror = function() {
                imageLoader.style.display = 'none';
                if (!navigator.onLine) {
                    errorText.innerText = '⚠️ الصورة غير متوفرة بدون إنترنت';
                    errorMsg.style.display = 'flex';
                }
            };

            // ---------- معالجة الرابط ----------
            function handleHash() {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#img-')) {
                    const num = parseInt(hash.replace('#img-', ''));
                    if (num >= 1 && num <= imageFiles.length) {
                        changeImage(num - 1);
                    }
                }
            }

            // ---------- بدء التطبيق ----------
            function init() {
                buildIcons();
                handleHash();
                
                const lastImage = sessionData?.lastImage;
                if (lastImage !== undefined && !window.location.hash) {
                    changeImage(lastImage);
                }
                
                if (sessionData?.zoom) {
                    scale = sessionData.zoom;
                    updateZoom();
                }
                
                if (localStorage.getItem('images_ready') === 'true') {
                    progressFill.style.width = '100%';
                    loadedCount.innerText = totalImages;
                    statusText.innerText = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                }
                
                cacheImages();
                updateStats();
                
                // حفظ الجلسة
                setInterval(() => {
                    saveSessionData({
                        favorites,
                        studiedImages,
                        quizScore,
                        darkMode,
                        lastImage: currentIndex,
                        zoom: scale
                    });
                }, 2000);
            }

            init();
        })();
    </script>
</body>
</html>
