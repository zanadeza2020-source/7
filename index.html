<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>تشريح • الأطلس الذكي</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f7fa;
            color: #1a4f58;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== الهيدر ===== */
        .header {
            background: #16636f;
            color: white;
            border-radius: 45px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 8px 18px rgba(0,55,65,0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: #ffdb9c;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .offline-badge {
            background: #22818f;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: 1px solid #9de0d8;
        }

        /* ===== شريط التقدم ===== */
        .progress-mini {
            background: white;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.02);
            border: 1px solid #d4ece5;
        }

        .progress-icon {
            background: #16636f;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffdb9c;
        }

        .progress-bar-small {
            flex: 1;
            height: 8px;
            background: #e1f0ec;
            border-radius: 20px;
            overflow: hidden;
            min-width: 140px;
        }

        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, #16636f, #3fa6b2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .progress-stats {
            font-size: 14px;
            font-weight: 600;
            color: #16636f;
        }

        /* ===== شبكة الأيقونات ===== */
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .icon-item {
            width: 60px;
            height: 65px;
            background: white;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .icon-item.active {
            border-color: #16636f;
            background: #e1f6f2;
            transform: scale(0.98);
        }

        .icon-item i {
            font-size: 22px;
            color: #16636f;
        }

        .icon-item span {
            font-size: 12px;
            font-weight: 700;
            color: #1a5f6b;
            background: #edf9f5;
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* ===== اللوحة الرئيسية ===== */
        .main-panel {
            background: white;
            border-radius: 40px;
            padding: 18px;
            box-shadow: 0 15px 30px rgba(0,50,60,0.05);
            border: 1px solid #ccebe4;
        }

        .display-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 18px;
        }

        /* ===== حاوية الصورة ===== */
        .image-box {
            background: #12363d;
            border-radius: 35px;
            overflow: hidden;
            aspect-ratio: 4/3;
            border: 4px solid #c6ece3;
            position: relative;
            touch-action: none;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #12363d;
            display: block;
            transition: transform 0.2s ease-out;
            pointer-events: none;
        }

        /* مؤشر تحميل الصورة */
        #imageLoader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 15;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            touch-action: none;
        }

        /* أزرار التحكم */
        .zoom-controls {
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid #80d6cc;
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:active {
            background: #16636f;
        }

        .zoom-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 15;
        }

        /* ===== بطاقة المعلومات ===== */
        .info-box {
            background: #f6fdfb;
            border-radius: 35px;
            padding: 18px;
            border: 1px solid #ccebe4;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-header h3 {
            font-size: 18px;
            color: #16636f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge {
            background: #16636f;
            color: white;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
        }

        .notes-content {
            background: white;
            border-radius: 30px;
            padding: 18px;
            max-height: 240px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 14px;
            border: 1px solid #c0e6dd;
            white-space: pre-line;
            scrollbar-width: thin;
        }

        /* ===== أزرار الإجراءات ===== */
        .action-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-sm {
            flex: 1;
            min-width: 75px;
            background: white;
            border: 1.5px solid #16636f;
            padding: 9px 4px;
            border-radius: 40px;
            font-weight: 600;
            color: #16636f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 13px;
            transition: 0.2s;
        }

        .action-sm:hover {
            background: #16636f;
            color: white;
        }

        /* ===== رسائل الخطأ ===== */
        .error-message {
            background: #ffede5;
            border: 1.5px solid #c95a5a;
            color: #a13b3b;
            padding: 12px 20px;
            border-radius: 45px;
            margin: 15px 0 0;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        /* ===== تذييل ===== */
        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #588e94;
            padding: 10px;
        }

        /* ===== تحسينات الجوال ===== */
        @media (max-width: 800px) {
            .display-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .icon-item {
                width: 52px;
                height: 58px;
            }
            .icon-item i {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>أطلس التشريح الذكي</h1>
            </div>
            <div class="offline-badge" id="offlineStatus">
                <i class="fas fa-cloud" id="statusIcon"></i>
                <span id="statusText">يتم التحميل...</span>
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-mini">
            <div class="progress-icon">
                <i class="fas fa-database"></i>
            </div>
            <div class="progress-bar-small">
                <div class="progress-fill-small" id="progressFill"></div>
            </div>
            <div class="progress-stats">
                <span id="loadedCount">0</span>/<span id="totalCount">9</span>
            </div>
        </div>

        <!-- شبكة الأيقونات -->
        <div class="icon-grid" id="iconGrid"></div>

        <!-- العرض الرئيسي -->
        <div class="main-panel">
            <div class="display-grid">
                <!-- الصورة -->
                <div class="image-box" id="imageContainer">
                    <img id="mainImage" src="" alt="صورة تشريحية" loading="lazy">
                    <div id="imageLoader">🔄 تحميل الصورة...</div>
                    <div class="touch-overlay" id="touchOverlay"></div>
                    
                    <div class="zoom-indicator" id="zoomIndicator">
                        <i class="fas fa-search"></i> <span id="zoomLevel">1.0x</span>
                    </div>

                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
                        <button class="zoom-btn" id="zoomReset"><i class="fas fa-undo-alt"></i></button>
                        <button class="zoom-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
                        <button class="zoom-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>

                <!-- المعلومات -->
                <div class="info-box">
                    <div class="info-header">
                        <h3><i class="fas fa-pen"></i> شرح الصورة</h3>
                        <span class="file-badge" id="filename">1.jpg</span>
                    </div>
                    <div class="notes-content" id="notesContent">
                        جاري التحميل...
                    </div>

                    <div class="action-group">
                        <button class="action-sm" id="downloadImg"><i class="fas fa-download"></i> صورة</button>
                        <button class="action-sm" id="downloadTxt"><i class="fas fa-file-alt"></i> نص</button>
                        <button class="action-sm" id="copyLink"><i class="fas fa-link"></i> رابط</button>
                        <button class="action-sm" id="shareBtn"><i class="fas fa-share-alt"></i> مشاركة</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <!-- تذييل -->
        <div class="footer" id="footer">
            <i class="fas fa-check-circle" style="color: #16636f;"></i>
            <span>يعمل بدون إنترنت بعد التحميل</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- البيانات ----------
            const notesData = [
                `# CHAPTER ONE: INTRODUCTION

## Anatomy | علم التشريح
Study of body structure

## Physiology | علم وظائف الأعضاء
Study of body function

### Tissues | الأنسجة
• Epithelial / طلائي
• Connective / ضام
• Muscle / عضلي
• Nerve / عصبي`,

                `# DIRECTIONAL TERMS

Superior (علوي) : above
Inferior (سفلي) : below
Anterior (أمامي) : front
Posterior (خلفي) : back
Medial (إنسي) : toward midline
Lateral (وحشي) : away from midline
Proximal (دان) : closer
Distal (قاصي) : farther`,

                `# BODY REGIONS

Head / الرأس
Neck / الرقبة
Thorax / الصدر
Abdomen / البطن
Pelvis / الحوض
Upper limb / الطرف العلوي
Lower limb / الطرف السفلي`,

                `# LEVELS OF ORGANIZATION

1. Chemical (كيميائي)
2. Cellular (خلوي)
3. Tissue (نسيجي)
4. Organ (عضو)
5. System (جهاز)
6. Organism (كائن حي)`,

                `# ABDOMINAL REGIONS

9 Regions:
- Hypochondriac (يمين/يسار)
- Lumbar (يمين/يسار)
- Iliac (يمين/يسار)
- Epigastric
- Umbilical
- Hypogastric`,

                `# BODY CAVITIES

Dorsal / خلفي:
- Cranial (دماغ)
- Vertebral (نخاع شوكي)

Ventral / أمامي:
- Thoracic (قلب, رئتين)
- Abdominal (جهاز هضمي)
- Pelvic (مثانة, تناسلي)`,

                `# HOMEOSTASIS

الاتزان الداخلي

Components:
• Receptor / مستقبل
• Control center / مركز تحكم
• Effector / منفذ

Negative feedback / تغذية راجعة سلبية
Positive feedback / تغذية راجعة إيجابية`,

                `# NEGATIVE FEEDBACK

Blood Glucose:
High → Insulin → Glucose down
Low → Glucagon → Glucose up

Body Temperature:
Hot → Sweating → Cooling
Cold → Shivering → Warming`,

                `# ANATOMICAL POSITION

الوضع التشريحي:
• Standing upright
• Face forward
• Palms forward
• Feet together`
            ];

            const imageFiles = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                '6.jpg', '7.jpg', '8.jpg', '9.jpg'
            ];

            // ---------- متغيرات الحالة ----------
            let currentIndex = 0;
            let scale = 1;
            const minScale = 0.8;
            const maxScale = 3.5;
            let initialDistance = 0;
            let lastTap = 0;
            let startX = 0;
            let loadedImages = 0;
            const totalImages = imageFiles.length;

            // عناصر DOM
            const iconGrid = document.getElementById('iconGrid');
            const mainImage = document.getElementById('mainImage');
            const filename = document.getElementById('filename');
            const notes = document.getElementById('notesContent');
            const touchOverlay = document.getElementById('touchOverlay');
            const zoomLevel = document.getElementById('zoomLevel');
            const progressFill = document.getElementById('progressFill');
            const loadedCount = document.getElementById('loadedCount');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const imageLoader = document.getElementById('imageLoader');

            // ---------- بناء الأيقونات ----------
            function buildIcons() {
                iconGrid.innerHTML = '';
                for (let i = 0; i < imageFiles.length; i++) {
                    const btn = document.createElement('div');
                    btn.className = `icon-item ${i === 0 ? 'active' : ''}`;
                    btn.setAttribute('data-index', i);
                    btn.innerHTML = `
                        <i class="fas fa-image"></i>
                        <span>${i + 1}</span>
                    `;
                    btn.onclick = () => changeImage(i);
                    iconGrid.appendChild(btn);
                }
            }

            // ---------- تغيير الصورة ----------
            function changeImage(index) {
                if (index < 0 || index >= imageFiles.length) return;
                
                currentIndex = index;
                imageLoader.style.display = 'block';
                mainImage.src = imageFiles[index];
                filename.innerText = imageFiles[index];
                notes.innerText = notesData[index];
                
                document.querySelectorAll('.icon-item').forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                
                scale = 1;
                updateZoom();
                window.location.hash = `img-${index + 1}`;
            }

            // ---------- تحديث التكبير ----------
            function updateZoom() {
                mainImage.style.transform = `scale(${scale})`;
                zoomLevel.innerText = scale.toFixed(1) + 'x';
            }

            // ---------- نظام اللمس المتطور ----------
            touchOverlay.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touches = e.touches;
                
                // للتنقل بالسحب
                if (touches.length === 1) {
                    startX = touches[0].clientX;
                }
                
                // للتكبير باللمس المزدوج
                if (touches.length === 2) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    initialDistance = Math.sqrt(dx * dx + dy * dy);
                }
            });

            touchOverlay.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touches = e.touches;
                
                if (touches.length === 2 && initialDistance > 0) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    const currentDistance = Math.sqrt(dx * dx + dy * dy);
                    const newScale = scale * (currentDistance / initialDistance);
                    scale = Math.min(maxScale, Math.max(minScale, newScale));
                    updateZoom();
                    initialDistance = currentDistance;
                }
            });

            touchOverlay.addEventListener('touchend', (e) => {
                const touches = e.touches;
                
                // التنقل بالسحب
                if (touches.length === 0) {
                    const endX = e.changedTouches[0].clientX;
                    const diff = endX - startX;
                    
                    if (Math.abs(diff) > 70) {
                        if (diff > 0 && currentIndex > 0) {
                            changeImage(currentIndex - 1); // سحب لليمين ← صورة سابقة
                        } else if (diff < 0 && currentIndex < imageFiles.length - 1) {
                            changeImage(currentIndex + 1); // سحب لليسار ← صورة تالية
                        }
                    }
                }
                
                if (touches.length < 2) initialDistance = 0;
                
                // النقرة المزدوجة للتكبير
                const currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    scale = scale > 1.5 ? 1 : 2.2;
                    updateZoom();
                }
                lastTap = currentTime;
            });

            touchOverlay.addEventListener('contextmenu', (e) => e.preventDefault());

            // ---------- أزرار التحكم ----------
            document.getElementById('zoomIn').onclick = () => {
                scale = Math.min(maxScale, scale + 0.3);
                updateZoom();
            };

            document.getElementById('zoomOut').onclick = () => {
                scale = Math.max(minScale, scale - 0.3);
                updateZoom();
            };

            document.getElementById('zoomReset').onclick = () => {
                scale = 1;
                updateZoom();
            };

            document.getElementById('fullscreenBtn').onclick = () => {
                const container = document.getElementById('imageContainer');
                if (container.requestFullscreen) container.requestFullscreen();
            };

            // ---------- أزرار الإجراءات ----------
            document.getElementById('downloadImg').onclick = () => {
                const link = document.createElement('a');
                link.href = imageFiles[currentIndex];
                link.download = imageFiles[currentIndex];
                link.click();
            };

            document.getElementById('downloadTxt').onclick = () => {
                const text = notesData[currentIndex];
                const blob = new Blob([text], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `notes_${currentIndex + 1}.txt`;
                link.click();
            };

            document.getElementById('copyLink').onclick = () => {
                const url = window.location.href.split('#')[0] + `#img-${currentIndex + 1}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert('✅ تم نسخ الرابط');
                });
            };

            document.getElementById('shareBtn').onclick = () => {
                if (navigator.share) {
                    navigator.share({
                        title: 'أطلس التشريح',
                        text: notesData[currentIndex].substring(0, 100) + '...',
                        url: window.location.href
                    });
                } else {
                    alert('يمكنك نسخ الرابط للمشاركة');
                }
            };

            // ---------- تحديث التقدم ----------
            function updateProgress() {
                loadedImages++;
                const percent = (loadedImages / totalImages) * 100;
                progressFill.style.width = percent + '%';
                loadedCount.innerText = loadedImages;
                
                if (loadedImages >= totalImages) {
                    statusText.innerText = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                    localStorage.setItem('images_ready', 'true');
                }
            }

            // ---------- تخزين الصور في Cache ----------
            async function cacheImages() {
                if ('caches' in window) {
                    try {
                        const cache = await caches.open('anatomy-v1');
                        
                        for (let i = 0; i < imageFiles.length; i++) {
                            const cached = await cache.match(imageFiles[i]);
                            if (cached) {
                                updateProgress();
                            } else {
                                fetch(imageFiles[i])
                                    .then(async (response) => {
                                        if (response.ok) {
                                            await cache.put(imageFiles[i], response.clone());
                                            updateProgress();
                                        }
                                    })
                                    .catch(() => {
                                        loadedImages++;
                                        updateProgress();
                                    });
                            }
                        }
                    } catch (err) {
                        console.log('Cache error:', err);
                    }
                }
            }

            // ---------- معالجة الصورة ----------
            mainImage.onload = function() {
                imageLoader.style.display = 'none';
                errorMsg.style.display = 'none';
            };

            mainImage.onerror = function() {
                imageLoader.style.display = 'none';
                if (!navigator.onLine) {
                    errorText.innerText = '⚠️ الصورة غير متوفرة بدون إنترنت';
                    errorMsg.style.display = 'flex';
                }
            };

            // ---------- معالجة الرابط ----------
            function handleHash() {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#img-')) {
                    const num = parseInt(hash.replace('#img-', ''));
                    if (num >= 1 && num <= imageFiles.length) {
                        changeImage(num - 1);
                    }
                }
            }

            // ---------- بدء التطبيق ----------
            function init() {
                buildIcons();
                handleHash();
                
                const lastImage = localStorage.getItem('last_image');
                if (lastImage && !window.location.hash) {
                    changeImage(parseInt(lastImage));
                }
                
                if (localStorage.getItem('images_ready') === 'true') {
                    progressFill.style.width = '100%';
                    loadedCount.innerText = totalImages;
                    statusText.innerText = 'متاح بدون إنترنت';
                    statusIcon.className = 'fas fa-check-circle';
                }
                
                cacheImages();
                setInterval(() => {
                    localStorage.setItem('last_image', currentIndex);
                }, 5000);
            }

            init();
        })();
    </script>
</body>
</html>
